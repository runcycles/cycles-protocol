  /v1/admin/api-keys:
    post:
      tags:
      - API Keys
      operationId: createApiKey
      summary: Create an API key for a tenant
      description: |-
        Provisions a new API key bound to a tenant. This is the only time the full key secret is returned. Store it securely.
        KEY FORMAT: - Prefix: cyc_live_{random} or cyc_test_{random} - Random part: 32 characters, cryptographically random - Stored as: bcrypt hash of full key
        PERMISSIONS: - Default for tenant keys: [reservations:create, reservations:commit,
          reservations:release, reservations:extend, reservations:list,
          balances:read, budgets:read, budgets:write, policies:read,
          policies:write]
        - Webhook/event self-service requires explicit opt-in:
          webhooks:read, webhooks:write, events:read are NOT in the default set.
        - This endpoint provisions tenant-scoped API keys only. The admin key
          (X-Admin-API-Key) is configured at the server level, not provisioned
          through this endpoint.
        - Admin permissions (admin:read, admin:write, and granular admin
          permissions like admin:tenants:read) are accepted for backward
          compatibility but SHOULD NOT be assigned to new tenant keys.
          Use the granular tenant permissions instead.
        - Can be restricted to specific scopes via scope_filter
        EXPIRY: - Recommended: 90 days for security - Can be set indefinitely but not recommended - Expired keys auto-fail validation
      security:
      - AdminKeyAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ApiKeyCreateRequest'
      responses:
        '201':
          description: API key created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiKeyCreateResponse'
        '401':
          description: Missing or invalid admin API key
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '400':
          description: Invalid tenant or permissions
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    get:
      tags:
      - API Keys
      operationId: listApiKeys
      summary: List API keys
      description: Returns keys for a tenant. Full key secrets are never returned, only prefixes and metadata.
      security:
      - AdminKeyAuth: []
      parameters:
      - name: tenant_id
        in: query
        required: true
        schema:
          type: string
      - name: status
        in: query
        schema:
          type: string
