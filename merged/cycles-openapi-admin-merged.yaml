  /v1/admin/api-keys/{key_id}:
    patch:
      tags:
      - API Keys
      operationId: updateApiKey
      summary: Update API key properties
      description: |-
        Partial update — only provided fields are modified. Allows changing permissions, scope restrictions, and metadata without rotating the key secret.
        MUTABLE FIELDS: - permissions: Replace the full permission set - scope_filter: Replace scope restrictions - name, description, metadata: Update display/tagging info
        IMMUTABLE FIELDS: - tenant_id, key_id, key_prefix, key_hash, expires_at, status - To change expiry: revoke and recreate - To change tenant: revoke and recreate
        EVENTS: - Emits api_key.permissions_changed when permissions or scope_filter change.
      security:
      - AdminKeyAuth: []
      parameters:
      - name: key_id
        in: path
        required: true
        schema:
          type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              properties:
                name:
                  type: string
                  maxLength: 256
                description:
                  type: string
                  maxLength: 1024
                permissions:
                  type: array
                  items:
                    $ref: '#/components/schemas/Permission'
                scope_filter:
                  type: array
                  items:
                    type: string
                metadata:
                  type: object
                  additionalProperties: true
      responses:
        '200':
          description: Key updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiKey'
        '400':
          description: Invalid request (e.g., unrecognized permission name, unknown fields)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Missing or invalid admin API key
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Key not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Key is revoked or expired (cannot modify)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    delete:
      tags:
      - API Keys
      operationId: revokeApiKey
      summary: Revoke an API key
      description: |-
        Immediately revokes a key. The key will fail validation from this point forward. Active reservations using this key can still be committed/released, but no new operations are permitted.
        REVOCATION IS PERMANENT: - Cannot be undone - Revoked keys remain in database for audit trail - Status transitions: ACTIVE → REVOKED
      security:
      - AdminKeyAuth: []
      parameters:
      - name: key_id
        in: path
        required: true
        schema:
          type: string
      - name: reason
        in: query
        schema:
          type: string
          maxLength: 512
      responses:
        '400':
          description: Bad request (malformed JSON, missing required fields, invalid enum, etc.)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '200':
          description: Key revoked
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiKey'
        '401':
          description: Missing or invalid admin API key
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Key not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: API key already revoked (ALREADY_REVOKED)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /v1/auth/validate:
    post:
      tags:
      - Authentication
      operationId: validateApiKey
      summary: Validate an API key and resolve tenant
      description: |-
        Internal endpoint used by runtime enforcement layer to validate keys and derive effective tenant.
        VALIDATION CHECKS: 1. Key exists in database 2. Key hash matches 3. Status is ACTIVE (not REVOKED or EXPIRED) 4. Current time < expires_at 5. Tenant is ACTIVE (not SUSPENDED or CLOSED)
        RESPONSE: - If valid: returns tenant_id, permissions, scope_filter - If invalid: returns valid=false with reason
        CACHING: - Results should be cached with short TTL (60s) - Invalidate cache on key revocation
      security:
      - AdminKeyAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ApiKeyValidationRequest'
      responses:
