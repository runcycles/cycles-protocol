                  rate_limits:
                    $ref: '#/components/schemas/RateLimits'
                  effective_from:
                    type: string
                    format: date-time
                  effective_until:
                    type: string
                    format: date-time
                  status:
                    type: string
                    enum:
                    - ACTIVE
                    - DISABLED
              - type: object
                description: Existing v0.1.25.7 updatePolicy fields (unchanged)
                properties:
                  name:
                    type: string
                  description:
                    type: string
                  priority:
                    type: integer
                  caps:
                    type: object
                  commit_overage_policy:
                    type: string
                  reservation_ttl_override:
                    type: object
                  rate_limits:
                    type: object
                  effective_from:
                    type: string
                    format: date-time
                  effective_until:
                    type: string
                    format: date-time
                  status:
                    type: string
                    enum:
                    - ACTIVE
