      - AdminKeyAuth: []
      parameters:
      - name: policy_id
        in: path
        required: true
        schema:
          type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              allOf:
              - type: object
                additionalProperties: false
                properties:
                  name:
                    type: string
                  description:
                    type: string
                  priority:
