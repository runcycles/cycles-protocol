  /v1/admin/budgets/fund:
    post:
      tags:
      - Budgets
      operationId: fundBudget
      summary: Credit, debit, or adjust budget allocation
      description: |-
        Modifies budget allocation and remaining balance outside the reservation flow. Common operations:
        AUTHORIZATION: - ApiKeyAuth: Tenant can fund their own budgets only (scoped by authenticated tenant) - AdminKeyAuth: Accepted as alternative (v0.1.25.6 dual-auth).
          When using AdminKeyAuth, tenant_id query parameter is REQUIRED for scoping.

        CREDIT (top-up): - allocated += amount - remaining += amount - Use for: monthly allocations, bonus credits
        DEBIT (drain): - allocated -= amount - remaining -= amount (fails if would go negative) - Use for: downgrades, refunds, policy enforcement
        RESET (reallocate): - allocated = amount - remaining = amount - reserved - spent - debt - Use for: period rollovers, plan changes
        REPAY_DEBT: - debt -= amount (use remaining if debt < amount) - Use for: manual debt reconciliation
        IDEMPOTENCY: - Required idempotency_key prevents double-funding - Replayed requests return original response
      security:
      - ApiKeyAuth: []
      - AdminKeyAuth: []
      parameters:
      - name: tenant_id
        in: query
        required: false
        description: 'When using ApiKeyAuth: ignored — the authenticated tenant from the API key is always
          used for scoping. When using AdminKeyAuth: REQUIRED — specifies which tenant''s budget to fund.
          Returns 400 if missing when using AdminKeyAuth.'
        schema:
          type: string
      - name: scope
        in: query
        required: true
        description: Canonical scope identifier, e.g., "tenant:acme" or "tenant:acme/workspace:prod"
        schema:
          type: string
      - name: unit
        in: query
        required: true
        schema:
          type: string
          enum:
          - USD_MICROCENTS
          - TOKENS
          - CREDITS
          - RISK_POINTS
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BudgetFundingRequest'
      responses:
        '200':
          description: Funding operation completed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BudgetFundingResponse'
        '400':
          description: Missing tenant_id when using AdminKeyAuth
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Missing or invalid API key / admin key
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: API key lacks budgets:write permission or scope_filter denies access
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Budget ledger not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Idempotency mismatch, insufficient funds for DEBIT, or budget is frozen/closed
          content:
