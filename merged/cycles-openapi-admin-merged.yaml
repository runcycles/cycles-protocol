            When a request is rate-limited, servers MUST return
            HTTP 429 Too Many Requests with a Retry-After header
            (value in seconds) indicating the earliest retry time.
            This is the contract SDKs and MCP gateways depend on for
            consistent back-off behavior. Servers MUST NOT silently
            drop rate-limited requests or return 403 / 503 in their
            place.

          MECHANISM (SHOULD):
            Specific abuse-protection mechanisms are implementation-defined
            because deployment topologies differ (direct, CDN-fronted,
            behind a WAF). Servers SHOULD:
              - Apply per-IP rate limits when deployed directly
                (recommended baseline: 60 requests per minute per source IP).
              - Apply per-edge-client limits when deployed behind a CDN
                or reverse proxy (using forwarded-for headers or equivalent).
              - Honor If-None-Match for cheap cache validation (prefer 304
                over 200 when possible — 304 responses SHOULD NOT count
                against rate limits).
          Servers MAY additionally use WAF, CDN caching, or bot-detection
          mechanisms — these are deployment concerns outside this spec.
      parameters:
      - name: risk_class
        in: query
        required: false
        schema:
          $ref: '#/components/schemas/ActionRiskClass'
      - name: deprecated
        in: query
        required: false
        schema:
          type: boolean
        description: Default false (exclude deprecated). Set true to include them.
      - name: cursor
        in: query
        required: false
        schema:
          type: string
      - name: limit
        in: query
        required: false
        schema:
          type: integer
          minimum: 1
          maximum: 100
          default: 50
      responses:
        '200':
          description: Action kind registry (paginated)
          headers:
            X-Request-Id:
              schema:
                type: string
            ETag:
              description: Registry version hash for cache validation.
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ActionKindRegistry'
        '400':
          description: Invalid filter parameter
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '429':
          description: Too many requests (rate limit exceeded)
          headers:
            Retry-After:
              description: Seconds until the client may retry.
              schema:
                type: integer
                minimum: 1
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /v1/action-kinds/{kind}:
    get:
      tags:
      - ActionKinds
      operationId: getActionKind
      summary: Get a single action kind by its kind string (exact match)
      security: []
      description: EXACT MATCH ONLY. Returns 200 if the kind string is in the registry, 404 if it is not.
        No prefix matching, no fuzzy matching, no "closest alternative." Convention-mapping (MCP tool
        name → registered kind) belongs in the MCP gateway layer, not here. Open endpoint — no API key
        required. Rate limiting rules from GET /v1/action-kinds apply to this endpoint as well.
      parameters:
      - $ref: '#/components/parameters/ActionKindParam'
      responses:
        '200':
          description: Action kind definition
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ActionKind'
        '404':
          description: Action kind not found in registry
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '429':
          description: Too many requests (rate limit exceeded)
          headers:
            Retry-After:
              description: Seconds until the client may retry.
              schema:
                type: integer
                minimum: 1
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /v1/admin/action-quota-counters:
    get:
      tags:
      - ActionQuotas
      operationId: listActionQuotaCounters
      summary: List live action quota counters (operator debug view)
      description: |-
        Returns current quota counter states. Reads live Redis state without modifying it. No server-side caching.
        USE CASES:
          - Tune quota limits: see what "max 2 emails per run" actually consumes.
          - Incident investigation: which run_id exhausted a quota.
          - Run Authority Timeline data source: fetch counters by run_id.

        TENANCY (NORMATIVE):
          - AdminKeyAuth: can query any tenant (tenant_id REQUIRED).
          - ApiKeyAuth: own tenant only. Requires action_quotas:read
            permission (primary) or balances:read permission (deprecated
            fallback for v0.1.26).

        PERMISSION MODEL (NORMATIVE):
          Servers MUST accept either:
            - action_quotas:read (PRIMARY — preferred for all new grants)
            - balances:read (DEPRECATED FALLBACK — v0.1.26 only, removed in v0.1.27)
          When accepting the balances:read fallback, servers SHOULD include
          a X-Cycles-Permission-Deprecated response header indicating the
          key should be re-granted with action_quotas:read.
          See PermissionExtension in cycles-governance-extensions-v0.1.26.yaml.
      security:
      - AdminKeyAuth: []
      - ApiKeyAuth: []
      parameters:
      - name: tenant_id
        in: query
        required: false
        schema:
          type: string
        description: 'AdminKeyAuth: REQUIRED. ApiKeyAuth: ignored (uses authenticated tenant).'
      - name: scope
        in: query
        required: false
        schema:
          type: string
        description: Prefix-match. E.g. "tenant:acme" returns all scopes under acme.
      - $ref: '#/components/parameters/ActionKindFilter'
      - $ref: '#/components/parameters/QuotaWindowFilter'
      - name: run_id
        in: query
        required: false
        schema:
          type: string
          maxLength: 256
        description: Filter per_run counters by Subject.dimensions.run_id value.
      - name: include_zero
        in: query
        required: false
        schema:
          type: boolean
          default: false
        description: Include counters where used=0. Default false.
      - name: cursor
        in: query
        required: false
        schema:
          type: string
      - name: limit
        in: query
        required: false
        schema:
          type: integer
          minimum: 1
          maximum: 200
          default: 50
      responses:
        '200':
          description: Action quota counter states
          headers:
            X-Request-Id:
              schema:
                type: string
            X-Cycles-Tenant:
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ActionQuotaCounterListResponse'
        '400':
          description: Missing tenant_id with AdminKeyAuth
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Missing or invalid key
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Insufficient permissions
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /v1/admin/action-quota-counters/reset:
    post:
      tags:
      - ActionQuotas
      operationId: resetActionQuotaCounter
      summary: Reset a specific quota counter (incident response)
      description: |-
        Atomically resets a single quota counter to zero. Intended for INCIDENT RESPONSE, not routine operations. See ActionQuotaCounterResetRequest for full semantics.
        USE CASES:
          - A bug caused double-counting; reset to unblock the affected agent.
          - An operator mistake needs to be unwound before the window expires.
          - Testing: reset a counter between test runs.

        NOT FOR:
          - Production quota tuning → change the policy max_calls instead.
          - Bypassing quota policies → reset leaves a permanent audit trail.

        AUDIT (NORMATIVE):
          Every successful reset MUST emit a quota.counter_reset event
          containing the previous counter value, the counter key fields,
          the acting admin identity, and the optional reason. Defined in
          cycles-protocol-extensions-v0.1.26.yaml (EventDataQuotaCounterReset).

        PERMISSION MODEL (NORMATIVE):
          POST /v1/admin/action-quota-counters/reset is AdminKeyAuth-only
          in v0.1.26. ApiKeyAuth is NOT accepted on this endpoint.
          Rationale: reset is a high-privilege operation that bypasses
          the quota policy temporarily. Restricting to AdminKeyAuth in
          v0.1.26 prevents accidental exposure via tenant-scoped keys.
          A finer-grained `action_quotas:write` permission MAY be added in
          v0.1.27 to allow tenant-scoped reset under ApiKeyAuth; until then
          there is no such permission and no ApiKeyAuth code path.

        TENANCY (NORMATIVE):
          - tenant_id in the request body is REQUIRED (AdminKeyAuth-only
            endpoint; the admin caller has no implicit tenant).
          - The operation targets exactly ONE counter identified by all
            key fields (tenant_id, scope, action_kind, window, window_key).
          - Bulk reset is NOT supported in v0.1.26. Operators submit one
            request per counter.
      security:
      - AdminKeyAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ActionQuotaCounterResetRequest'
      responses:
        '200':
          description: Counter reset successfully
          headers:
            X-Request-Id:
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ActionQuotaCounterResetResponse'
        '400':
          description: 'Invalid request: missing required field, invalid key combination, or malformed
            body'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Missing or invalid admin API key
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Insufficient permissions (requires AdminKeyAuth in v0.1.26)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Counter not found (no counter matches the specified key fields)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
