  /v1/admin/budgets/freeze:
    post:
      tags:
      - Budgets
      operationId: freezeBudget
      summary: Freeze a budget (ACTIVE → FROZEN)
      description: |-
        Transitions a budget from ACTIVE to FROZEN. Frozen budgets block all fund operations and new reservations, but can still be updated (overdraft_limit, commit_overage_policy, metadata).
        AUTHORIZATION: - Requires admin key (X-Admin-API-Key)
        TRANSITION RULES: - ACTIVE → FROZEN: Allowed - FROZEN → FROZEN: 409 (already frozen) - CLOSED → FROZEN: 409 (closed is irreversible)
        EVENTS: - Emits budget.frozen event on successful transition.
      security:
      - AdminKeyAuth: []
      parameters:
      - name: scope
        in: query
        required: true
        description: Canonical scope identifier
        schema:
          type: string
      - name: unit
        in: query
        required: true
        schema:
          $ref: '#/components/schemas/UnitEnum'
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BudgetStatusTransitionRequest'
      responses:
        '200':
          description: Budget frozen
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BudgetLedger'
        '400':
          description: Invalid request body (e.g., unknown fields, reason too long)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Missing or invalid admin API key
          content:
            application/json:
              schema:
