  /v1/admin/policies/{policy_id}:
    patch:
      tags:
      - Policies
      operationId: updatePolicyActionQuotas
      summary: Update policy properties
      description: |-
        Update any mutable field on an existing policy.
        AUTHORIZATION: - ApiKeyAuth: tenant scoping enforced — only the owning tenant
          can update.
        - AdminKeyAuth: admin operator can update policies on behalf of
          any tenant. Server validates that the policy belongs to the
          tenant owning the path-resolved policy_id; no tenant_id is
          needed in the body because policy_id already pins it. Audit
          log records actor_type=ADMIN_ON_BEHALF_OF. Added v0.1.25.13.

        Extends PATCH /v1/admin/policies/{policy_id} from the governance spec. All existing fields unchanged. Adds action_quotas, risk_class_quotas, allowed_action_kinds, and denied_action_kinds with replacement semantics. AUTHORIZATION: ApiKeyAuth with policies:write, OR AdminKeyAuth (admin operator updating on behalf of a tenant). Auth follows the base updatePolicy operation in cycles-governance-admin v0.1.25.13 — without AdminKeyAuth here, admins could update policy name/scope but not action_quotas, which would be inconsistent. policy_id pins the owning tenant, so no body change is needed. BACKWARD COMPATIBILITY: requests omitting new fields are identical to v0.1.25.
      security:
