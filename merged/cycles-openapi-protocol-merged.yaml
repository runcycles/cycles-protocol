          description: Amount returned from over-reservation (if any)
        balances:
          type: array
          items:
            $ref: '#/components/schemas/Balance'
    ReleaseRequest:
      type: object
      required:
      - idempotency_key
      additionalProperties: false
      properties:
        idempotency_key:
          $ref: '#/components/schemas/IdempotencyKey'
        reason:
          type: string
          maxLength: 256
    ReleaseResponse:
