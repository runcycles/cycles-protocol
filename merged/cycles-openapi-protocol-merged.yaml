    CommitOveragePolicy:
      type: string
      description: "How server handles commits where actual > reserved.\nREJECT: reject commit (client\
        \ must reserve a buffer or over-estimate).\n  Recommended: add 10-20% buffer to estimates when\
        \ using REJECT.\n  If the action already happened externally, this creates an unaccounted gap.\n\
        \nALLOW_IF_AVAILABLE (default): commit always succeeds when actual > reserved. If remaining budget\
        \ supports the full delta, charge it atomically across all derived scopes. Otherwise, cap the\
        \ delta to available remaining (minimum across all affected scopes, floor 0), charge estimate\
        \ + capped_delta, and set is_over_limit=true on scopes where the full delta could not be covered.\
        \ This blocks future reservations until reconciled. Never creates debt. Never rejects a commit\
        \ — the action already happened.\nALLOW_WITH_OVERDRAFT: if remaining budget supports the delta,\
        \ commit normally. Otherwise, check if (debt + delta) <= overdraft_limit across all affected scopes.\n\
        \  If yes: commit succeeds, add delta to debt, remaining can go negative.\n  If no: commit fails\
        \ with 409 OVERDRAFT_LIMIT_EXCEEDED.\nThis policy ensures the ledger always reflects reality even\
        \ when budget is exhausted at commit time.\nCONCURRENCY (NORMATIVE):\n  - The overdraft_limit\
        \ check is performed per-commit and is NOT atomic across concurrent commits to the same scope.\n\
        \  - Multiple commits may each individually pass the (debt + delta) <= limit check but collectively\
        \ cause debt to exceed overdraft_limit.\n  - This is acceptable: all commits succeed (actions\
        \ already happened), and the scope enters \"over-limit\" state, \n    blocking future reservations\
        \ until reconciled.\n  - Servers SHOULD use optimistic locking or compare-and-swap on debt updates\
        \ to ensure individual commit atomicity, \n    but cross-commit atomicity is not required.\n"
      enum:
      - REJECT
      - ALLOW_IF_AVAILABLE
      - ALLOW_WITH_OVERDRAFT
    ReservationStatus:
      type: string
      description: Reservation lifecycle state (v1+ may add additional terminal states).
      enum:
      - ACTIVE
      - COMMITTED
      - RELEASED
      - EXPIRED
    ReservationCreateRequest:
