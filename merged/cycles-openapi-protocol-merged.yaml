          name: summarize-document
        estimate:
          unit: USD_MICROCENTS
          amount: 500000
        ttl_ms: 30000
      properties:
        idempotency_key:
          $ref: '#/components/schemas/IdempotencyKey'
        subject:
          $ref: '#/components/schemas/Subject'
        action:
          $ref: '#/components/schemas/Action'
        estimate:
          $ref: '#/components/schemas/Amount'
        ttl_ms:
          type: integer
          minimum: 1000
          maximum: 86400000
          default: 60000
        grace_period_ms:
          type: integer
          minimum: 0
          maximum: 60000
          default: 5000
          description: |
            Grace window after TTL for in-flight commits. Default 5s.
            OPERATIONAL GUIDANCE: - For high-latency actions (streaming LLM, slow APIs), consider setting higher (10-30s).
            INTEROP / SAFETY RATIONALE: - The 60s maximum is an interoperability ceiling to limit long-lived "in-flight" commit windows and reduce
              zombie-reservation and abuse surface (grace extends the time that a crashed client can keep budget locked).

            LONG-RUNNING WORKFLOWS: - For multi-minute operations, clients SHOULD keep ttl_ms relatively short and use /v1/reservations/{reservation_id}/extend
              as a heartbeat, and/or use chunked reserve/commit cycles rather than relying on large grace_period_ms.
        overage_policy:
          $ref: '#/components/schemas/CommitOveragePolicy'
          default: ALLOW_IF_AVAILABLE
        dry_run:
          type: boolean
          default: false
          description: |
            Shadow-mode evaluation. If true, the server MUST evaluate the reservation request and return decision/caps/affected_scopes as if it would reserve, but MUST NOT modify balances, persist a reservation, or require commit/release. Intended for safe rollout and testing of full reserve-path logic.
        metadata:
          type: object
          additionalProperties: true
    Balance:
      type: object
      required:
      - scope
      - scope_path
      - remaining
      additionalProperties: false
      example:
        scope: tenant:acme-corp/workspace:prod
        scope_path: tenant:acme-corp/workspace:prod
        remaining:
          unit: USD_MICROCENTS
          amount: 4577000
        reserved:
          unit: USD_MICROCENTS
          amount: 500000
        spent:
          unit: USD_MICROCENTS
          amount: 423000
        allocated:
          unit: USD_MICROCENTS
          amount: 5500000
      description: "Ledger state for a single (scope, unit) balance.\nUNIT CONSISTENCY (NORMATIVE):\n\
        \  - All Amount fields within a Balance (remaining/reserved/spent/allocated/debt/overdraft_limit),\
        \ if present, MUST share the same unit.\n  - Servers MUST NOT emit a Balance with mixed units;\
        \ clients MAY treat such responses as invalid.\n\nLEDGER INVARIANT (NORMATIVE):\n   - If allocated,\
        \ spent, reserved, and debt are all present, then remaining MUST satisfy: \n     remaining.amount\
        \ = allocated.amount - spent.amount - reserved.amount - debt.amount (same unit).\n   - Note that\
        \ remaining.amount can be negative when debt exceeds available budget.\n   - If allocated is absent,\
        \ remaining is authoritative and clients MUST treat it as opaque (i.e., MUST NOT derive it from\
        \ other fields).\n   - Servers MUST NOT emit a Balance where the invariant is violated when all\
        \ fields are present.\n\nDEBT SEMANTICS (NORMATIVE):\n   - debt represents actual consumption\
        \ that occurred when insufficient budget was available to cover a commit overage.\n   - debt is\
        \ created only when overage_policy=ALLOW_WITH_OVERDRAFT and (remaining + released_reservation)\
        \ < actual at commit time.\n   - When debt > 0, new reservations MUST be rejected with 409 DEBT_OUTSTANDING\
        \ (unless explicitly allowed by policy).\n   - debt MUST be repaid via budget funding operations\
        \ (out-of-scope for this API) before new reservations are permitted.\n   - When budget is added\
        \ to a scope with debt > 0, debt MUST be repaid first, then remaining funds added to remaining.\n\
        \nOVERDRAFT LIMIT (NORMATIVE):\n   - overdraft_limit defines the target maximum debt for this\
        \ scope.\n   - If overdraft_limit is absent or amount=0, no overdraft is permitted (behaves as\
        \ ALLOW_IF_AVAILABLE).\n   - The overdraft_limit is enforced per-commit but is NOT atomic across\
        \ concurrent commits.\n     Multiple concurrent commits MAY cause cumulative debt to briefly exceed\
        \ overdraft_limit.\n   - Individual commits are rejected with 409 OVERDRAFT_LIMIT_EXCEEDED only\
        \ if (current_debt + delta) > overdraft_limit \n     at the moment of that specific commit.\n\
        \   - When debt > overdraft_limit after reconciliation (due to concurrent commits), the scope\
        \ enters an \"over-limit\" state:\n       * The server MUST set is_over_limit=true on the Balance\n\
        \       * ALL new reservations against that scope MUST be rejected with 409 OVERDRAFT_LIMIT_EXCEEDED\
        \ (not DEBT_OUTSTANDING)\n       * Existing active reservations MAY be committed or released normally\n\
        \       * The server SHOULD emit alerts/events for operator intervention\n   - Once debt is repaid\
        \ below overdraft_limit, is_over_limit returns to false and normal reservation operation resumes."
      properties:
        scope:
          type: string
          description: Canonical scope identifier (server-derived), e.g. "tenant:t1", "workflow:run123"
        scope_path:
          type: string
          description: Canonical hierarchical path (server-derived)
        remaining:
          $ref: '#/components/schemas/SignedAmount'
          description: 'Available budget for new reservations. Can be negative when debt exceeds allocated
            budget. Formula: remaining = allocated - spent - reserved - debt'
        reserved:
          $ref: '#/components/schemas/Amount'
          description: Amount currently locked by active reservations
        spent:
          $ref: '#/components/schemas/Amount'
          description: Amount successfully committed through reservations
        debt:
          $ref: '#/components/schemas/Amount'
          description: Overdraft amount from commits where actual > reserved and insufficient budget existed
            to cover the delta. Represents consumption that happened but couldn't be paid from available
            budget at commit time. Must be repaid before new reservations are allowed (unless policy permits
            otherwise).
        allocated:
          $ref: '#/components/schemas/Amount'
          description: Optional total budget cap if a fixed allocation exists.
        overdraft_limit:
          $ref: '#/components/schemas/Amount'
          description: Optional maximum debt allowed for this scope. If absent or amount=0, no overdraft
            is permitted. When present and amount > 0, commits can succeed by creating debt up to this
            limit.
        is_over_limit:
          type: boolean
          description: True when debt > overdraft_limit due to concurrent commits creating cumulative
            debt beyond the limit, or when ALLOW_IF_AVAILABLE could not cover the full overage delta and
            capped the charge. When true, ALL new reservations against this scope are blocked with 409
            OVERDRAFT_LIMIT_EXCEEDED until reconciled (debt repaid below overdraft_limit, or is_over_limit
            cleared by operator). Defaults to false when absent.
    ReservationCreateResponse:
      type: object
      required:
      - decision
      - affected_scopes
      additionalProperties: false
      example:
        decision: ALLOW
        reservation_id: rsv_a1b2c3d4
        reserved:
          unit: USD_MICROCENTS
          amount: 500000
        expires_at_ms: 1712956830000
        scope_path: tenant:acme-corp/workspace:prod/agent:summarizer
        affected_scopes:
        - tenant:acme-corp
        - tenant:acme-corp/workspace:prod
        - tenant:acme-corp/workspace:prod/agent:summarizer
      properties:
        decision:
          $ref: '#/components/schemas/DecisionEnum'
          description: |
            For dry_run=true, decision MAY be DENY. For dry_run=false, insufficient budget MUST be expressed via 409 BUDGET_EXCEEDED (not decision=DENY).
        reservation_id:
          type: string
          description: Present if decision is ALLOW or ALLOW_WITH_CAPS and dry_run is false. MUST be absent
            when dry_run is true.
        reserved:
          $ref: '#/components/schemas/Amount'
        expires_at_ms:
          type: integer
          format: int64
        scope_path:
          type: string
          description: Canonical scope path (server-derived)
        affected_scopes:
          type: array
          items:
            type: string
          description: Canonical scope identifiers impacted by this reservation, in canonical order.
        caps:
          $ref: '#/components/schemas/Caps'
          description: Present only when decision=ALLOW_WITH_CAPS; MUST be absent otherwise.
        balances:
          type: array
          items:
            $ref: '#/components/schemas/Balance'
        reason_code:
          $ref: '#/components/schemas/DecisionReasonCode'
        retry_after_ms:
          type: integer
          minimum: 0
    StandardMetrics:
      type: object
      description: |
        Optional standard metrics for commit/event. All fields are optional. Recommended for consistency across clients. For custom fields, use `custom`.
      additionalProperties: false
      properties:
        tokens_input:
          type: integer
          minimum: 0
          description: Input tokens consumed
        tokens_output:
          type: integer
          minimum: 0
          description: Output tokens generated
        latency_ms:
          type: integer
          minimum: 0
          description: Total operation latency in milliseconds
        model_version:
          type: string
          maxLength: 128
          description: Actual model/tool version used
        custom:
          type: object
          additionalProperties: true
          description: Arbitrary additional metrics
    CommitRequest:
      type: object
      required:
      - idempotency_key
      - actual
      additionalProperties: false
      example:
        idempotency_key: idem_20260412_run42_step1_commit
        actual:
          unit: USD_MICROCENTS
          amount: 423000
        metrics:
          tokens_input: 1500
          tokens_output: 800
          latency_ms: 2340
          model_version: claude-sonnet-4-20250514
      properties:
        idempotency_key:
          $ref: '#/components/schemas/IdempotencyKey'
        actual:
          $ref: '#/components/schemas/Amount'
        metrics:
          $ref: '#/components/schemas/StandardMetrics'
        metadata:
          type: object
          additionalProperties: true
    CommitResponse:
      type: object
      required:
      - status
      - charged
      additionalProperties: false
      properties:
        status:
          type: string
          enum:
          - COMMITTED
        charged:
          $ref: '#/components/schemas/Amount'
          description: Amount actually charged to the budget. Equals actual when the full amount could
            be covered. With ALLOW_IF_AVAILABLE, charged may be less than actual when the overage delta
            is capped to available remaining (charged = estimate + capped_delta).
        released:
