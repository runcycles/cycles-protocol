      required:
      - status
      - released
      additionalProperties: false
      properties:
        status:
          type: string
          enum:
          - RELEASED
        released:
          $ref: '#/components/schemas/Amount'
        balances:
          type: array
          items:
            $ref: '#/components/schemas/Balance'
    ReservationDetail:
      type: object
      description: |
        Reservation details returned by GET /v1/reservations/{reservation_id}. Useful for debugging.
      required:
      - reservation_id
      - status
      - subject
      - action
      - reserved
      - created_at_ms
      - expires_at_ms
      - scope_path
      - affected_scopes
      additionalProperties: false
      properties:
        reservation_id:
          type: string
        status:
          $ref: '#/components/schemas/ReservationStatus'
        idempotency_key:
          $ref: '#/components/schemas/IdempotencyKey'
          description: Present if the server persists reservation creation idempotency keys for debugging/recovery.
        subject:
          $ref: '#/components/schemas/Subject'
        action:
          $ref: '#/components/schemas/Action'
        reserved:
          $ref: '#/components/schemas/Amount'
        committed:
          $ref: '#/components/schemas/Amount'
        created_at_ms:
          type: integer
          format: int64
        expires_at_ms:
          type: integer
          format: int64
        finalized_at_ms:
          type: integer
          format: int64
        scope_path:
          type: string
          description: Canonical scope path (server-derived)
        affected_scopes:
          type: array
          items:
            type: string
          description: Canonical scope identifiers impacted by this reservation, in canonical order.
        metadata:
          type: object
          additionalProperties: true
    BalanceResponse:
      type: object
      required:
      - balances
      additionalProperties: false
      properties:
        balances:
          type: array
          items:
            $ref: '#/components/schemas/Balance'
        next_cursor:
          type: string
          description: Opaque cursor for next page (if any).
        has_more:
          type: boolean
          description: True if next_cursor is present and more results may be available.
    EventCreateRequest:
      type: object
      required:
      - idempotency_key
      - subject
      - action
      - actual
      additionalProperties: false
      properties:
        idempotency_key:
          $ref: '#/components/schemas/IdempotencyKey'
        subject:
          $ref: '#/components/schemas/Subject'
        action:
          $ref: '#/components/schemas/Action'
        actual:
          $ref: '#/components/schemas/Amount'
        overage_policy:
          $ref: '#/components/schemas/CommitOveragePolicy'
          default: ALLOW_IF_AVAILABLE
          description: |
            How server handles events where actual would exceed remaining budget. REJECT: server MUST return 409 BUDGET_EXCEEDED if actual > remaining across any derived scope. ALLOW_IF_AVAILABLE (default): event always succeeds. If remaining budget supports the full actual, charge it atomically. Otherwise, cap the charge to available remaining (minimum across all derived scopes, floor 0) and set is_over_limit=true on scopes where the full amount could not be covered. Never creates debt. Never rejects an event. ALLOW_WITH_OVERDRAFT: if remaining budget supports actual, apply normally. Otherwise, check if (current_debt + actual) <= overdraft_limit across all derived scopes. If yes: apply succeeds, add actual to debt, remaining can go negative. If no: server MUST return 409 OVERDRAFT_LIMIT_EXCEEDED. Concurrency semantics are identical to commit: the overdraft_limit check is per-event and NOT atomic across concurrent events; scopes may enter over-limit state if concurrent events collectively exceed overdraft_limit.
        metrics:
          $ref: '#/components/schemas/StandardMetrics'
        client_time_ms:
          type: integer
          format: int64
          minimum: 0
          description: |
            Optional client-observed timestamp (ms). This value is advisory only and MUST NOT be used for authorization, expiry,  idempotency or budget enforcement decisions. The server's receipt time governs all budget comparisons and invariants.
        metadata:
          type: object
          additionalProperties: true
      description: |
        NOTE: Events MUST be applied atomically across derived scopes (same as reservations), or rejected.
    EventCreateResponse:
      type: object
      required:
      - status
      - event_id
      additionalProperties: false
      properties:
        status:
          type: string
          enum:
          - APPLIED
        event_id:
          type: string
        charged:
          description: The amount actually applied.  Present when overage_policy is ALLOW_IF_AVAILABLE
            and the actual was capped to the remaining budget, so the client can see the effective charge.
          $ref: '#/components/schemas/Amount'
        balances:
          type: array
          items:
            $ref: '#/components/schemas/Balance'
    ReservationSummary:
      type: object
      additionalProperties: false
      required:
      - reservation_id
      - status
      - subject
      - action
      - reserved
      - created_at_ms
      - expires_at_ms
      - scope_path
      - affected_scopes
      properties:
        reservation_id:
          type: string
        status:
          $ref: '#/components/schemas/ReservationStatus'
        idempotency_key:
          $ref: '#/components/schemas/IdempotencyKey'
          description: Present if the server persists reservation creation idempotency keys.
        subject:
          $ref: '#/components/schemas/Subject'
        action:
          $ref: '#/components/schemas/Action'
        reserved:
          $ref: '#/components/schemas/Amount'
        created_at_ms:
          type: integer
          format: int64
          minimum: 0
        expires_at_ms:
          type: integer
          format: int64
          minimum: 0
        scope_path:
          type: string
        affected_scopes:
          type: array
          items:
            type: string
    ReservationListResponse:
      type: object
      additionalProperties: false
      required:
      - reservations
      properties:
        reservations:
          type: array
          items:
            $ref: '#/components/schemas/ReservationSummary'
        next_cursor:
          type: string
          description: Opaque cursor for next page (if any).
        has_more:
          type: boolean
          description: True if next_cursor is present and more results may be available.
    ReservationExtendRequest:
      type: object
      required:
      - idempotency_key
      - extend_by_ms
      additionalProperties: false
      properties:
        idempotency_key:
          $ref: '#/components/schemas/IdempotencyKey'
        extend_by_ms:
          type: integer
          minimum: 1
          maximum: 86400000
          description: |
            Amount of time (ms) to extend the reservation expiry relative to its current expires_at_ms  (i.e., not relative to request time). This does NOT change reserved amount. Server MAY clamp the effective extension to policy limits; the returned expires_at_ms is authoritative.
        metadata:
          type: object
          additionalProperties: true
          description: Optional debugging/audit metadata.
    ReservationExtendResponse:
      type: object
      required:
      - status
      - expires_at_ms
      additionalProperties: false
      properties:
        status:
          type: string
          enum:
          - ACTIVE
          description: Reservation remains ACTIVE after a successful extension.
        expires_at_ms:
          type: integer
          format: int64
          minimum: 0
          description: New server-authoritative expiry timestamp (ms).
        balances:
          type: array
          items:
            $ref: '#/components/schemas/Balance'
          description: Optional updated balances snapshot after extension (nice-to-have).
    ActionQuotaViolation:
      type: object
      description: Structured detail about the quota rule that caused a DENY. Present in DenyDetail.quota_violation
        when reason_code=ACTION_QUOTA_EXCEEDED. ActionQuotaWindow is defined in cycles-action-kinds-v0.1.26.yaml.
      required:
      - action_kind
      - window
      - used
      - limit
      - scope
      additionalProperties: false
      example:
        action_kind: email.send
        window: per_run
        used: 5
        limit: 5
        scope: tenant:acme-corp/workspace:prod/agent:support-bot
        policy_id: pol_support_limits
      properties:
        action_kind:
          type: string
          maxLength: 64
        window:
          type: string
          enum:
          - per_run
          - per_minute_tumbling
          - per_hour_tumbling
          - per_day_tumbling
          - per_tenant_per_day
          description: See cycles-action-kinds-v0.1.26.yaml ActionQuotaWindow.
        window_key:
          type: string
          description: Specific window instance key (e.g. run_id for per_run).
        used:
          type: integer
          format: int64
        limit:
          type: integer
          format: int64
        scope:
          type: string
          description: Canonical scope where the quota is enforced.
        policy_id:
          type: string
        risk_class:
          type: string
          enum:
          - read_only
          - local_mutation
          - side_effect
          - external_side_effect
          - high_risk
          description: Present when the violated quota is a risk-class-level quota (RiskClassQuota in
            cycles-action-kinds-v0.1.26.yaml). When present, action_kind is the specific kind that triggered
            the violation, and risk_class identifies the aggregate quota that was exceeded.
    DenyDetail:
      type: object
      description: |-
        Enriched deny context returned alongside DENY decisions and 409 errors. Provides operator-grade information: which rule fired, what quota was hit, and what to change.
        POPULATION RULES:
          - reason_code MUST be populated on every DENY.
          - quota_violation MUST be populated when reason_code=ACTION_QUOTA_EXCEEDED.
          - suggested_fix SHOULD be populated whenever the server can determine
            a corrective action.
          - blocked_by_policy SHOULD be populated when a named policy caused DENY.
          - blocked_by_scope SHOULD be populated with the specific scope that
            ran out of budget or quota.
          - budget_remaining SHOULD be populated on BUDGET_EXCEEDED.
      required:
      - reason_code
      additionalProperties: false
      example:
        reason_code: ACTION_QUOTA_EXCEEDED
        quota_violation:
          action_kind: email.send
          window: per_run
          used: 5
          limit: 5
          scope: tenant:acme-corp/workspace:prod/agent:support-bot
          policy_id: pol_support_limits
        blocked_by_policy: pol_support_limits
        blocked_by_scope: tenant:acme-corp/workspace:prod/agent:support-bot
        suggested_fix: Increase email.send quota from 5 to 10 per_run in policy 'pol_support_limits'
      properties:
        reason_code:
          type: string
          maxLength: 128
          description: |-
            Known values:
              BUDGET_EXCEEDED, BUDGET_FROZEN, BUDGET_CLOSED, BUDGET_NOT_FOUND,
              OVERDRAFT_LIMIT_EXCEEDED, DEBT_OUTSTANDING,
              ACTION_QUOTA_EXCEEDED, ACTION_KIND_NOT_ALLOWED, ACTION_KIND_DENIED,
              TENANT_SUSPENDED, POLICY_VIOLATION.

            The first six are the v0.1.25 base-spec known values documented on the DecisionReasonCode schema in cycles-protocol-v0.yaml (an OPEN string with documented known values — not a closed enum, so extensions can add new reason codes without base spec changes). v0.1.26 adds ACTION_QUOTA_EXCEEDED, ACTION_KIND_NOT_ALLOWED, and ACTION_KIND_DENIED to the known values for this field. TENANT_SUSPENDED and POLICY_VIOLATION are additional governance-context reasons that MAY appear on DenyDetail but are not listed on the base DecisionReasonCode known values.
            Consumers MUST gracefully handle unrecognized values (e.g., log and display as-is) — future extensions may add more.
        quota_violation:
          $ref: '#/components/schemas/ActionQuotaViolation'
          description: Present only when reason_code=ACTION_QUOTA_EXCEEDED.
        blocked_by_scope:
          type: string
          description: Most specific scope in the hierarchy that caused DENY.
        blocked_by_policy:
          type: string
          maxLength: 256
          description: Name or ID of the policy that blocked this request.
        suggested_fix:
          type: string
          maxLength: 512
          description: |-
            Human-readable corrective action. Examples:
              "Increase email quota from 2 to 5 per run in policy 'support-agent-defaults'"
              "Fund tenant:acme budget by at least 500000 USD_MICROCENTS"
              "Repay overdraft debt of 12000 USD_MICROCENTS before new reservations"
        budget_remaining:
          type: integer
          format: int64
          description: Current remaining balance at the blocking scope (in the reservation unit). Present
            on BUDGET_EXCEEDED. Can be negative in overdraft scenarios.
    ObserveModeEnum:
      type: string
      description: |-
        Observation mode for reservation evaluation. DISABLED: synonym for ENFORCE. OBSERVE: full evaluation, no side effects, emits observed_denied on DENY
                 and observed_allowed on ALLOW/ALLOW_WITH_CAPS.
                 The preferred product-facing API for shadow mode rollout.
        ENFORCE: normal enforcement (default). Preserves v0.1.25 semantics.
      enum:
      - DISABLED
      - OBSERVE
      - ENFORCE
    ActionExtension:
      type: object
      description: Additive extension to Action. Adds optional policy_keys for routing. policy_keys schema
        defined in cycles-action-kinds-v0.1.26.yaml. Ignored by v0.1.25 servers — no breaking change.
      properties:
        policy_keys:
          type: object
          description: 'Extra routing dimensions for policy matching. See ActionPolicyKeys in cycles-action-kinds-v0.1.26.yaml
            for the full schema. Fields: host, recipient_domain, resource_type, path_prefix, custom.'
    DecisionResponseExtension:
      type: object
      description: |-
        Additive extension to DecisionResponse.
        deny_detail MUST be populated when decision=DENY.
        Absent on ALLOW and ALLOW_WITH_CAPS.

        REASON CODE POPULATION (NORMATIVE):
          The base DecisionResponse.reason_code field is an OPEN string
          (DecisionReasonCode schema in cycles-protocol-v0.yaml). It accepts
          any reason string including v0.1.26 extension values. v0.1.26
          servers populate it as follows:

          - For base v0.1.25 denials (BUDGET_EXCEEDED, BUDGET_FROZEN,
            BUDGET_CLOSED, BUDGET_NOT_FOUND, OVERDRAFT_LIMIT_EXCEEDED,
            DEBT_OUTSTANDING):
              * Populate DecisionResponse.reason_code with the matching value.
              * Populate deny_detail.reason_code with the same value (mirror).

          - For v0.1.26 extension denials (ACTION_QUOTA_EXCEEDED,
            ACTION_KIND_DENIED, ACTION_KIND_NOT_ALLOWED):
              * Populate DecisionResponse.reason_code with the v0.1.26 reason string.
              * Populate deny_detail.reason_code with the same value (mirror).
              * deny_detail carries the structured context: quota_violation,
                blocked_by_policy, blocked_by_scope, suggested_fix.

          The same string appears in both fields. reason_code is the
          quick-filter primitive; deny_detail is the rich structured view.
          Dashboards and strict clients that need to filter by reason can
          use reason_code directly without parsing deny_detail.

          v0.1.25.7 CLIENTS: continue to work unchanged. They see the string
          on reason_code and either recognize it (base codes) or log it as
          unknown (v0.1.26 codes) and fall back to generic DENY handling.
          The DecisionReasonCode schema is an open string so strict
          validators MUST accept unknown values.
      properties:
        deny_detail:
          $ref: '#/components/schemas/DenyDetail'
    ReservationCreateResponseExtension:
      type: object
      description: |-
        Additive extension to ReservationCreateResponse.
        deny_detail MUST be populated when decision=DENY in dry_run or
        observe_mode=OBSERVE context.
        On live 409 DENY: deny_detail appears in ErrorResponse.details.

        REASON CODE POPULATION (NORMATIVE):
          Same rules as DecisionResponseExtension: ReservationCreateResponse.reason_code
          is populated with the denial reason string (base or v0.1.26 extension
          value), and deny_detail.reason_code mirrors it with additional
          structured context. The base DecisionReasonCode schema is an open
          string that accepts both base and extension values.
          See DecisionResponseExtension for the full population rule.
      properties:
        deny_detail:
          $ref: '#/components/schemas/DenyDetail'
    ErrorResponseExtension:
      type: object
      description: Additive extension to ErrorResponse. When error=BUDGET_EXCEEDED, ACTION_QUOTA_EXCEEDED,
        OVERDRAFT_LIMIT_EXCEEDED, or DEBT_OUTSTANDING, implementations SHOULD include deny_detail in the
        details object (details.deny_detail). The details field is already additionalProperties:true in
        the base spec.
      properties:
        details:
          type: object
          additionalProperties: true
          properties:
            deny_detail:
              $ref: '#/components/schemas/DenyDetail'
    ReservationCreateRequestExtension:
      type: object
      description: Additive extension to ReservationCreateRequest. observe_mode overrides the tenant-level
        observe_mode for this request. If absent, tenant.observe_mode governs (defined in governance extension).
        See DRY_RUN VS OBSERVE_MODE precedence in info.description.
      properties:
        observe_mode:
          $ref: '#/components/schemas/ObserveModeEnum'
    ErrorCodeExtension:
      type: string
      description: Extended ErrorCode enum. Adds ACTION_QUOTA_EXCEEDED, ACTION_KIND_NOT_ALLOWED, and ACTION_KIND_DENIED.
        All v0.1.25 codes unchanged. Implementations MUST add these three codes to the ErrorCode enum.
      enum:
      - INVALID_REQUEST
      - UNAUTHORIZED
      - FORBIDDEN
      - NOT_FOUND
      - BUDGET_EXCEEDED
      - BUDGET_FROZEN
      - BUDGET_CLOSED
      - RESERVATION_EXPIRED
      - RESERVATION_FINALIZED
      - IDEMPOTENCY_MISMATCH
      - UNIT_MISMATCH
      - OVERDRAFT_LIMIT_EXCEEDED
      - DEBT_OUTSTANDING
      - MAX_EXTENSIONS_EXCEEDED
      - INTERNAL_ERROR
      - ACTION_QUOTA_EXCEEDED
      - ACTION_KIND_NOT_ALLOWED
      - ACTION_KIND_DENIED
    EventTypeExtension:
      type: string
      description: Extended EventType enum. Adds reservation.observed_denied, reservation.observed_allowed,
        quota.threshold_approaching, and quota.counter_reset. All 40 v0.1.25 types unchanged.
      enum:
      - budget.created
      - budget.updated
      - budget.funded
      - budget.debited
      - budget.reset
      - budget.debt_repaid
      - budget.frozen
      - budget.unfrozen
      - budget.closed
      - budget.threshold_crossed
      - budget.exhausted
      - budget.over_limit_entered
      - budget.over_limit_exited
      - budget.debt_incurred
      - budget.burn_rate_anomaly
      - reservation.denied
      - reservation.denial_rate_spike
      - reservation.expired
      - reservation.expiry_rate_spike
      - reservation.commit_overage
      - tenant.created
      - tenant.updated
      - tenant.suspended
      - tenant.reactivated
      - tenant.closed
      - tenant.settings_changed
      - api_key.created
      - api_key.revoked
      - api_key.expired
      - api_key.permissions_changed
      - api_key.auth_failed
      - api_key.auth_failure_rate_spike
      - policy.created
      - policy.updated
      - policy.deleted
      - system.store_connection_lost
      - system.store_connection_restored
      - system.high_latency
      - system.webhook_delivery_failed
      - system.webhook_test
      - reservation.observed_denied
      - reservation.observed_allowed
      - quota.threshold_approaching
      - quota.counter_reset
    EventDataObservedDenied:
      type: object
      description: |-
        Payload for reservation.observed_denied events. Emitted when effective observe_mode=OBSERVE and evaluation returns DENY. Carries shadow-evaluation / observe-mode context: deny_detail, action, subject, estimated_amount, would_have_blocked_at.
        DISTINCT FROM reservation.denied — AND WHY:
          reservation.denied drives production alerting and denial rate-spike
          detection. Mixing shadow-mode denials would add noise during rollout
          and make spike detection unreliable. Separate event types preserve
          clean signal in both streams.

        CORRELATION WITH reservation.denied (NORMATIVE):
          For reservation.observed_denied events specifically, the server
          MUST populate the Event envelope's top-level correlation_id
          field using a deterministic hash over at least
          (tenant_id, scope, action_kind, window_key, reason_code).
          Servers MAY include policy_id to reduce collisions across distinct
          denial causes in the same scope and window.
          correlation_id is NOT duplicated inside this payload — it belongs
          only on the envelope. Dashboard consumers reading event.correlation_id
          can JOIN observed_denied and reservation.denied streams without
          merging the event types.
          This rule applies ONLY to reservation.observed_denied.
          reservation.observed_allowed and quota.threshold_approaching use
          their own correlation rules (see those schemas).

        DEDUPLICATION: consumers MUST deduplicate on event_id.
      required:
      - scope
      - deny_detail
      - observe_mode
      properties:
        scope:
          type: string
        unit:
          type: string
          enum:
          - USD_MICROCENTS
          - TOKENS
          - CREDITS
          - RISK_POINTS
        deny_detail:
          $ref: '#/components/schemas/DenyDetail'
        action:
          type: object
          description: Action that was observed-denied (from the reservation request).
          properties:
            kind:
              type: string
            name:
              type: string
            policy_keys:
              type: object
              description: See ActionPolicyKeys in cycles-action-kinds-v0.1.26.yaml.
              additionalProperties: true
        subject:
          type: object
          additionalProperties: true
        estimated_amount:
          type: integer
          format: int64
        observe_mode:
          $ref: '#/components/schemas/ObserveModeEnum'
          description: Always OBSERVE for this event type.
        would_have_blocked_at:
          type: string
          description: Same as deny_detail.blocked_by_scope.
    EventDataObservedAllowed:
      type: object
      description: |-
        Payload for reservation.observed_allowed events. Emitted when effective observe_mode=OBSERVE and evaluation returns ALLOW or ALLOW_WITH_CAPS.
        DISTINCT FROM normal ALLOW — AND WHY:
          Normal enforcement does not emit events on ALLOW (only on DENY
          and lifecycle transitions). Observe mode needs ALLOW events to
          measure shadow rollout coverage: "how many requests would have
          succeeded under the new policy?" Without this event, operators
          can count shadow denials but have no denominator for denial rate.

        VOLUME CONSIDERATIONS:
          ALLOW events may be high-volume. Servers SHOULD support sampling
          via a server-side configuration (e.g., observe_allow_sample_rate).
          When sampling, the event payload MUST include the sample_rate so
          consumers can extrapolate. If not sampling, sample_rate is absent
          or 1.0.

        CORRELATION (NORMATIVE):
          reservation.observed_allowed events have no counterpart in the
          production event stream (there is no reservation.allowed event),
          so cross-stream correlation is not applicable. Servers SHOULD
          still populate event.correlation_id to correlate multiple
          observed_allowed events within a single run, using a deterministic
          hash over (tenant_id, scope, run_id). If run_id is absent, omit
          correlation_id rather than using an incorrect key.

        DEDUPLICATION: consumers MUST deduplicate on event_id.
      required:
      - scope
      - decision
      - observe_mode
      properties:
        scope:
          type: string
        decision:
          type: string
          enum:
          - ALLOW
          - ALLOW_WITH_CAPS
          description: The decision that was evaluated (never DENY for this event type).
        unit:
          type: string
          enum:
          - USD_MICROCENTS
          - TOKENS
          - CREDITS
          - RISK_POINTS
        action:
          type: object
          description: Action that was observed-allowed.
          properties:
            kind:
              type: string
            name:
              type: string
            policy_keys:
              type: object
              description: See ActionPolicyKeys in cycles-action-kinds-v0.1.26.yaml.
              additionalProperties: true
        subject:
          type: object
          additionalProperties: true
        estimated_amount:
          type: integer
          format: int64
        observe_mode:
          $ref: '#/components/schemas/ObserveModeEnum'
          description: Always OBSERVE for this event type.
        caps_applied:
          type: object
          description: Present when decision=ALLOW_WITH_CAPS. Describes what caps would have been applied
            (same structure as base spec caps).
          additionalProperties: true
        sample_rate:
          type: number
          format: double
          exclusiveMinimum: 0.0
          maximum: 1.0
          description: Sampling rate. 1.0 = every ALLOW emits an event. 0.1 = 10% of ALLOWs emit events.
            Absent = 1.0 (no sampling). Consumers SHOULD multiply event counts by 1/sample_rate for accurate
            totals.
    EventDataQuotaThresholdApproaching:
      type: object
      description: |-
        Payload for quota.threshold_approaching events. Emitted when a quota counter crosses a configured threshold percentage. Analogous to budget.threshold_crossed for budgets.
        EMISSION RULES (NORMATIVE):
          - Emitted at most ONCE per (scope, action_kind/risk_class, window,
            window_key, threshold_pct) combination per threshold crossing.
          - "Crossing" means: previous used/limit ratio was below threshold_pct,
            and after this increment it is at or above threshold_pct.
          - Server MUST NOT re-emit for the same window_key after the
            threshold has already been crossed (no repeated alerts within
            the same hour/day/minute/run).
          - If the counter resets (new window bucket), the threshold resets.

        OBSERVE MODE: When observe_mode=OBSERVE, counters are NOT incremented, so threshold events are NOT emitted. Threshold events are only meaningful in ENFORCE mode where counters actually move.
        CORRELATION (NORMATIVE):
          Servers MUST populate event.correlation_id using a deterministic
          hash over (tenant_id, scope, action_kind_or_risk_class, window,
          window_key). This allows dashboards to correlate a threshold
          crossing with the subsequent quota-exceeded denials in the
          same window. For risk-class quotas, use the risk_class value
          in place of action_kind in the hash input.

        DEDUPLICATION: consumers MUST deduplicate on event_id.
      required:
      - scope
      - action_kind
      - window
      - used
      - limit
      - threshold_pct
      properties:
        scope:
          type: string
        action_kind:
          type: string
          maxLength: 64
          description: The action kind, or "__risk__" for risk-class quotas.
        risk_class:
          type: string
          enum:
          - read_only
          - local_mutation
          - side_effect
          - external_side_effect
          - high_risk
          description: Present for risk-class quota threshold crossings.
        window:
          type: string
          enum:
          - per_run
          - per_minute_tumbling
          - per_hour_tumbling
          - per_day_tumbling
          - per_tenant_per_day
        window_key:
          type: string
          description: Specific window instance (run_id, UTC hour, etc.).
        used:
          type: integer
          format: int64
          description: Counter value at time of threshold crossing.
        limit:
          type: integer
          format: int64
        threshold_pct:
          type: number
          format: double
          minimum: 0.01
          maximum: 0.99
          description: The configured threshold percentage that was crossed (e.g. 0.80). Matches ActionQuota.threshold_pct
            / RiskClassQuota.threshold_pct.
        policy_id:
          type: string
        tenant_id:
          type: string
    EventDataQuotaCounterReset:
      type: object
      description: |-
        Payload for quota.counter_reset events. Emitted when an operator manually resets a quota counter via POST /v1/admin/action-quota-counters/reset (defined in cycles-action-kinds-v0.1.26.yaml).
        WHY THIS EVENT EXISTS:
          Counter reset is a high-privilege administrative action. It can
          unblock stuck agents (e.g., after a bug caused double-counting)
          but it also bypasses the quota policy. Dashboards and audit
          systems need a first-class signal when resets happen.

        AUDIT TRAIL (NORMATIVE):
          Servers MUST emit this event for every successful counter reset.
          The event MUST include the acting admin identity (actor_id),
          the counter key fields, the previous used value, and the reset
          reason if provided.

        CORRELATION:
          Servers MUST populate event.correlation_id using a deterministic
          hash over (tenant_id, scope, action_kind_or_risk_class, window,
          window_key). This lets dashboards correlate a reset with the
          counter's earlier threshold crossings and denial events.

        DEDUPLICATION: consumers MUST deduplicate on event_id.
      required:
      - scope
      - action_kind
      - window
      - window_key
      - previous_used
      - actor_id
      properties:
        scope:
          type: string
        action_kind:
          type: string
          maxLength: 64
          description: The action kind, or "__risk__" for risk-class counters.
        risk_class:
          type: string
          enum:
          - read_only
          - local_mutation
          - side_effect
          - external_side_effect
          - high_risk
          description: Present for risk-class counter resets.
        window:
          type: string
          enum:
          - per_run
          - per_minute_tumbling
          - per_hour_tumbling
          - per_day_tumbling
          - per_tenant_per_day
        window_key:
          type: string
          description: Specific window instance that was reset.
        previous_used:
          type: integer
          format: int64
          minimum: 0
          description: Counter value immediately before the reset (for audit).
        limit:
          type: integer
          format: int64
          description: Configured max_calls for the counter (for audit context).
        actor_id:
          type: string
          description: Identity of the admin that performed the reset (API key ID or admin user ID).
        reason:
          type: string
          maxLength: 512
          description: Optional human-readable reason for the reset.
        policy_id:
          type: string
        tenant_id:
          type: string
    ActionRiskClass:
      type: string
      description: |-
        Normalized risk class for an action kind. Used by the policy engine for routing behavior and default budget weights when no explicit quota rule matches.
        ORDERING (ascending risk):
          read_only < local_mutation < side_effect < external_side_effect < high_risk

        RISK_POINTS WEIGHTS:
          Default weights are NOT part of this specification. They are
          server-configurable. Embedding defaults here would conflate
          semantic taxonomy with policy configuration.

        NOTE ON llm.completion:
          llm.completion is classified as side_effect for governance purposes,
          not because it mutates external state. It consumes budget, may
          produce output that drives downstream side effects, and has
          non-trivial blast radius in agent loops.
      enum:
      - read_only
      - local_mutation
      - side_effect
      - external_side_effect
      - high_risk
    ActionPolicyKeySpec:
      type: object
      description: Declares which extra dimensions a policy engine should extract from Action.policy_keys
        when evaluating quota rules for this action kind. Presence means the dimension is meaningful for
        policy matching.
      additionalProperties: false
      properties:
        host:
          type: boolean
          description: True if HTTP host is a meaningful policy dimension.
        recipient_domain:
          type: boolean
          description: True if recipient domain is a policy dimension.
        resource_type:
          type: string
          description: Name of the resource dimension (e.g. "table" for db.write, "collection" for vector.upsert,
            "object_type" for crm.record.write).
        path_prefix:
          type: boolean
          description: True if file/resource path prefix is a policy dimension.
    ActionKind:
      type: object
      description: A single entry in the canonical Cycles action kind registry. Action kinds provide a
        stable, cross-framework vocabulary for policy rules and quota definitions.
      required:
      - kind
      - risk_class
      additionalProperties: false
      example:
        kind: llm.completion
        risk_class: side_effect
        description: Synchronous text completion via any LLM provider
        mcp_tool_prefixes:
        - llm_complete
        - text_generate
      properties:
        kind:
          type: string
          maxLength: 64
          description: 'Canonical action kind string. Format: <category>.<operation>[.<qualifier>].'
        risk_class:
          $ref: '#/components/schemas/ActionRiskClass'
        policy_key_spec:
          $ref: '#/components/schemas/ActionPolicyKeySpec'
          description: Which policy key dimensions are meaningful for this action kind. Absent for kinds
            with no host/domain/resource routing.
        description:
          type: string
          maxLength: 512
        mcp_tool_prefixes:
          type: array
          items:
            type: string
            maxLength: 128
          description: MCP tool name prefixes that conventionally map to this kind. Used by the MCP gateway
            for automatic normalization when tools do not carry an x-cycles-action-kind annotation.
        deprecated:
          type: boolean
          default: false
        replacement_kind:
          type: string
          maxLength: 64
    ActionKindRegistry:
      type: object
      description: Returned by GET /v1/action-kinds.
      required:
      - kinds
      - version
      additionalProperties: false
      properties:
        version:
          type: string
          description: Registry version (semver). Incremented when kinds are added or deprecated.
        kinds:
          type: array
          items:
            $ref: '#/components/schemas/ActionKind'
        next_cursor:
          type: string
        has_more:
          type: boolean
    ActionPolicyKeys:
      type: object
      description: Extra dimensions sent by clients in Action objects for policy routing. Allows quota
        rules and allow/deny lists to be scoped to specific hosts, domains, resource types, or file paths
        — not just action kinds. If not provided, policy routing falls back to action.kind only. This
        is the REQUEST-SIDE companion to the registry's ActionPolicyKeySpec, which declares which dimensions
        are meaningful per kind.
      additionalProperties: false
      properties:
        host:
          type: string
          maxLength: 253
          description: Hostname only, no port, no scheme. E.g. "api.sendgrid.com".
        recipient_domain:
          type: string
          maxLength: 253
          description: Domain only. E.g. "customer.com".
        resource_type:
          type: string
          maxLength: 128
          description: E.g. "users", "orders", "contacts", "leads".
        path_prefix:
          type: string
          maxLength: 512
          description: Absolute path prefix. E.g. "/workspace/output".
        custom:
          type: object
          additionalProperties:
            type: string
            maxLength: 256
          maxProperties: 8
    ActionQuotaWindow:
      type: string
      description: |-
        Time window for action quota enforcement. See WINDOW MODEL in info.description.
        per_run:
          Keyed on Subject.dimensions.run_id. REQUIRED — if absent and
          per_run quota applies, server MUST return 400 INVALID_REQUEST.
          No calendar bucket; bucket IS the run_id.

        per_minute_tumbling:
          Calendar bucket = UTC minute of request receipt (YYYY-MM-DDTHH:MM).
          Resets at top of each UTC minute. Cleanup TTL: 120s.
          Use for burst protection: prevent agents from exhausting hourly
          quotas in seconds. Example: max 5 emails per minute.

        per_hour_tumbling:
          Calendar bucket = UTC hour of request receipt.
          Resets at top of each UTC hour. Cleanup TTL: 3660s.

        per_day_tumbling:
          Calendar bucket = UTC calendar date of request receipt.
          Resets at UTC midnight. Cleanup TTL: 90000s.

        per_tenant_per_day:
          Same as per_day_tumbling but scope always normalized to
          tenant root regardless of reservation subject hierarchy.
      enum:
      - per_run
      - per_minute_tumbling
      - per_hour_tumbling
      - per_day_tumbling
      - per_tenant_per_day
    ActionQuota:
      type: object
      description: |-
        A single action count quota rule. When attached to a Policy via action_quotas, enforces that the action_kind does not exceed max_calls within the window for scopes matching the policy's scope_pattern.
        ATOMICITY: counter increments atomically with the budget reserve. A reservation failing quota check MUST NOT modify any balance. See info.description ATOMICITY section.
      required:
      - action_kind
      - max_calls
      - window
      additionalProperties: false
      properties:
        action_kind:
          type: string
          maxLength: 64
          description: The action kind this quota applies to. Wildcards not supported in v0; specify exact
            kind strings.
        max_calls:
          type: integer
          minimum: 1
          maximum: 100000
          description: Maximum reserve calls allowed within the window.
        window:
          $ref: '#/components/schemas/ActionQuotaWindow'
        host_allowlist:
          type: array
          items:
            type: string
            maxLength: 253
          description: If non-empty, quota only applies where Action.policy_keys.host matches.
        recipient_domain_allowlist:
          type: array
          items:
            type: string
            maxLength: 253
          description: If non-empty, quota only applies where Action.policy_keys.recipient_domain matches.
        resource_type_allowlist:
          type: array
          items:
            type: string
            maxLength: 128
          description: If non-empty, quota only applies where Action.policy_keys.resource_type matches.
        per_run_counter_ttl_ms:
          type: integer
          minimum: 60000
          maximum: 604800000
          default: 86400000
          description: 'Only meaningful when window=per_run. Redis key TTL refreshed on each increment.
            Default: 86400000ms (24h). Max: 604800000ms (7d). Servers MUST NOT allow this for non-per_run
            windows. OPERATOR WARNING: if a run pauses longer than this value with no new increments,
            the counter key may expire mid-run, silently resetting quota headroom for the same run_id.
            Set to at least the maximum expected run duration plus a cleanup margin (minimum 2x the longest
            expected inter-action pause within a run).'
        threshold_pct:
          type: number
          format: double
          minimum: 0.01
          maximum: 0.99
          default: 0.8
          description: 'Percentage of max_calls at which a quota.threshold_approaching event is emitted.
            Default: 0.80 (80%). Set to 0.99 to alert only near exhaustion. Server emits at most once
            per window instance per threshold crossing. See EventDataQuotaThresholdApproaching in cycles-protocol-extensions-v0.1.26.yaml.'
    RiskClassQuota:
      type: object
      description: |-
        A risk-class-level action count quota rule. When attached to a Policy via risk_class_quotas, enforces that ALL action kinds of the specified risk_class do not collectively exceed max_calls within the window for scopes matching the policy's scope_pattern.
        Unlike ActionQuota (which targets a single action_kind), RiskClassQuota aggregates across all kinds in a risk class. Example: "max 50 external_side_effect actions per hour" caps the total of email sends, Slack posts, SMS sends, social media posts, etc.
        A reservation may be subject to BOTH a risk-class quota AND a per-kind quota. Both must pass. If either fails, DENY.
        ATOMICITY: counter increments atomically with per-kind counters and budget balance. All in the same atomic Lua block. See info.description.
        PER_RUN LIFECYCLE: when window=per_run, risk-class counters follow the same increment/decrement/auto-expiry lifecycle as per-kind counters. See PER_RUN COUNTER LIFECYCLE in info.description.
      required:
      - risk_class
      - max_calls
      - window
      additionalProperties: false
      properties:
        risk_class:
          $ref: '#/components/schemas/ActionRiskClass'
          description: The risk class this quota applies to. Counts all action kinds with this risk_class
            in aggregate.
        max_calls:
          type: integer
          minimum: 1
          maximum: 100000
          description: Maximum reserve calls (across all kinds in the risk class) within the window.
        window:
          $ref: '#/components/schemas/ActionQuotaWindow'
        per_run_counter_ttl_ms:
          type: integer
          minimum: 60000
          maximum: 604800000
          default: 86400000
          description: Only meaningful when window=per_run. Same semantics as ActionQuota.per_run_counter_ttl_ms.
        threshold_pct:
          type: number
          format: double
          minimum: 0.01
          maximum: 0.99
          default: 0.8
          description: Percentage of max_calls at which a quota.threshold_approaching event is emitted.
            Same semantics as ActionQuota.threshold_pct.
    ActionQuotaState:
      type: object
      description: Current state of a single quota counter. Returned by GET /v1/admin/action-quota-counters
        for operator visibility. For risk-class counters, action_kind is "__risk__" and risk_class identifies
        the aggregated risk class.
      required:
      - action_kind
      - scope
      - window
      - used
      - limit
      additionalProperties: false
      example:
        action_kind: llm.completion
        scope: tenant:acme-corp/workspace:prod
        scope_path: tenant:acme-corp/workspace:prod
        window: per_hour_tumbling
        used: 142
        limit: 200
        remaining: 58
        policy_id: pol_eng_default
        expires_at: '2026-04-12T15:00:00Z'
        last_incremented_at: '2026-04-12T14:32:17Z'
      properties:
        action_kind:
          type: string
          maxLength: 64
          description: The action kind for per-kind counters, or "__risk__" for risk-class counters.
        risk_class:
          $ref: '#/components/schemas/ActionRiskClass'
          description: Present for risk-class quota counters. Identifies the risk class being aggregated.
            When present, action_kind is "__risk__".
        scope:
          type: string
        scope_path:
          type: string
        window:
          $ref: '#/components/schemas/ActionQuotaWindow'
        window_key:
          type: string
          description: Specific window instance key (e.g. run_id for per_run, UTC hour string for per_hour_tumbling).
        used:
          type: integer
          format: int64
          minimum: 0
        limit:
          type: integer
          format: int64
          minimum: 1
        remaining:
          type: integer
          format: int64
          description: limit - used. Floored at 0.
        policy_id:
          type: string
        expires_at:
          type: string
          format: date-time
          description: When this counter's window expires (for per_hour_tumbling, per_day_tumbling, per_tenant_per_day).
        last_incremented_at:
          type: string
          format: date-time
    ActionQuotaCounterListResponse:
      type: object
      required:
      - counters
      - has_more
      additionalProperties: false
      properties:
        counters:
          type: array
          items:
            $ref: '#/components/schemas/ActionQuotaState'
        next_cursor:
          type: string
        has_more:
          type: boolean
    ActionQuotaCounterResetRequest:
      type: object
      description: |-
        Request body for POST /v1/admin/action-quota-counters/reset. Identifies a single counter by its key fields and triggers a reset.
        RESET SEMANTICS (NORMATIVE):
          - The counter value is set to 0 atomically.
          - The counter TTL is preserved (for calendar-bucket windows) or
            refreshed (for per_run counters).
          - A quota.counter_reset event is emitted with the previous value.
          - Active reservations are NOT affected — only the counter state.
          - The reset is IRREVERSIBLE. Admins SHOULD provide a reason.

        RESET IS NOT RECOMMENDED for:
          - Production quota tuning (change the policy limit instead).
          - Routine operations (counters expire naturally via window boundaries).
        Reset is intended for INCIDENT RESPONSE — e.g., a stuck counter due to a bug, or an operator mistake that needs to be unwound.
      required:
      - scope
      - action_kind
      - window
      - window_key
      additionalProperties: false
      properties:
        tenant_id:
          type: string
          description: REQUIRED when using AdminKeyAuth. Ignored when using ApiKeyAuth (uses the authenticated
            tenant).
        scope:
          type: string
          description: Canonical scope string of the counter.
        action_kind:
          type: string
          maxLength: 64
          description: The action kind of the counter, or "__risk__" for risk-class counters.
        risk_class:
          $ref: '#/components/schemas/ActionRiskClass'
          description: Required when action_kind="__risk__". Identifies the risk-class counter to reset.
        window:
          $ref: '#/components/schemas/ActionQuotaWindow'
        window_key:
          type: string
          description: Specific window instance key (run_id, UTC hour string, etc.). MUST exactly match
            an existing counter key.
        reason:
          type: string
          maxLength: 512
          description: Optional human-readable reason for the reset. Included in the quota.counter_reset
            event for audit purposes.
    ActionQuotaCounterResetResponse:
      type: object
      description: Response after a successful counter reset.
      required:
      - counter
      - previous_used
      additionalProperties: false
      properties:
        counter:
          $ref: '#/components/schemas/ActionQuotaState'
          description: Counter state after the reset (used=0).
        previous_used:
          type: integer
          format: int64
          minimum: 0
          description: Counter used value immediately before the reset.
  parameters:
    IdempotencyKeyHeader:
      name: X-Idempotency-Key
      in: header
      required: false
      description: Optional idempotency key header. If both header and body idempotency_key are provided,
        they MUST match. Server MUST enforce idempotency per endpoint by (effective tenant, endpoint,
        idempotency_key). On replay of an idempotent request that previously succeeded, server MUST return
        the original successful response payload (including any server-generated identifiers such as reservation_id).
      schema:
        $ref: '#/components/schemas/IdempotencyKey'
    ReservationId:
      name: reservation_id
      in: path
      required: true
      schema:
        type: string
        minLength: 1
        maxLength: 128
    Limit:
      name: limit
      in: query
      required: false
      schema:
        type: integer
        minimum: 1
        maximum: 200
        default: 50
      description: Maximum number of results to return
    Cursor:
      name: cursor
      in: query
      required: false
      schema:
        type: string
      description: Opaque cursor from previous response
    ActionKindParam:
      name: kind
      in: path
      required: true
      schema:
        type: string
        maxLength: 64
      description: Canonical action kind string (e.g. "message.email.send")
    QuotaWindowFilter:
      name: window
      in: query
      required: false
      schema:
        $ref: '#/components/schemas/ActionQuotaWindow'
      description: Filter quota counters by window type.
    ActionKindFilter:
      name: action_kind
      in: query
      required: false
      schema:
        type: string
        maxLength: 64
      description: Filter by action kind.
  headers:
    X-Request-Id:
      description: Unique request identifier for debugging
      schema:
        type: string
    X-RateLimit-Remaining:
      description: Number of requests remaining in current window (optional in v0)
      schema:
        type: integer
    X-RateLimit-Reset:
      description: Unix timestamp (seconds) when rate limit resets (optional in v0)
      schema:
        type: integer
        format: int64
    X-Cycles-Tenant:
      description: Effective tenant identifier derived from auth context (optional in v0)
      schema:
        type: string
  responses:
    ErrorResponse:
      description: Error response
      headers:
        X-Request-Id:
          $ref: '#/components/headers/X-Request-Id'
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
paths:
  /v1/decide:
    post:
      tags:
      - Decisions
      operationId: decide
      summary: Optional preflight policy decision (no reservation created)
      description: |-
        Returns ALLOW / DENY, optionally with Caps for soft landing. This endpoint does not reserve budget. Clients that require concurrency safety MUST use /v1/reservations.
        IDEMPOTENCY (NORMATIVE):  - On replay with the same idempotency_key, the server MUST return the original successful response payload.
        TENANCY (NORMATIVE):  - subject.tenant MUST match the effective tenant derived from auth; otherwise the server MUST return 403 FORBIDDEN.
        DEBT/OVERDRAFT STATE (NORMATIVE): - If the subject scope has debt > 0 or is_over_limit=true, server SHOULD return  decision=DENY with reason_code=DEBT_OUTSTANDING or reason_code=OVERDRAFT_LIMIT_EXCEEDED  respectively. Server MUST NOT return 409 for these conditions on /decide.
        Idempotency on /decide is for request deduplication only. A replayed ALLOW response reflects budget state at the time of  the original call; clients MUST NOT treat a replayed decision as current budget authorization.
      parameters:
      - $ref: '#/components/parameters/IdempotencyKeyHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DecisionRequest'
      responses:
        '200':
          description: Decision result
          headers:
            X-Request-Id:
              $ref: '#/components/headers/X-Request-Id'
            X-Cycles-Tenant:
              $ref: '#/components/headers/X-Cycles-Tenant'
            X-RateLimit-Remaining:
              $ref: '#/components/headers/X-RateLimit-Remaining'
            X-RateLimit-Reset:
              $ref: '#/components/headers/X-RateLimit-Reset'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DecisionResponse'
        '400':
          $ref: '#/components/responses/ErrorResponse'
        '401':
          $ref: '#/components/responses/ErrorResponse'
        '403':
          $ref: '#/components/responses/ErrorResponse'
        '409':
          $ref: '#/components/responses/ErrorResponse'
        '500':
          $ref: '#/components/responses/ErrorResponse'
  /v1/reservations:
    post:
      tags:
      - Reservations
      operationId: createReservation
      summary: Reserve budget for a planned action (concurrency-safe)
      description: "Atomically reserves the estimated amount across server-derived scopes and returns\
        \ a reservation_id. Reservations expire at expires_at_ms; commits are accepted through (expires_at_ms\
        \ + grace_period_ms). \nIf dry_run=true, server MUST evaluate the full reservation request and\
        \ return decision/caps/affected_scopes/balances as if the reservation were live, but MUST NOT\
        \ modify balances, persist a reservation, or require commit/release.\nDRY-RUN RESPONSE RULES (NORMATIVE):\
        \ - reservation_id and expires_at_ms MUST be absent. - affected_scopes MUST be populated regardless\
        \ of decision outcome (ALLOW / ALLOW_WITH_CAPS / DENY). - If decision=ALLOW_WITH_CAPS, caps MUST\
        \ be present; otherwise caps MUST be absent. - If decision=DENY, reason_code SHOULD be populated;\
        \ it is the primary diagnostic signal for why the dry_run was denied. - balances MAY be populated\
        \ (recommended for operator visibility), but MUST reflect a non-mutating evaluation.\nOVER-LIMIT\
        \ BLOCKING (NORMATIVE): - If ANY affected scope has debt > overdraft_limit (is_over_limit=true),\
        \ the reservation MUST be rejected \n  with 409 OVERDRAFT_LIMIT_EXCEEDED, regardless of available\
        \ remaining budget.\n- This blocks new work when overdraft reconciliation is needed.\nIDEMPOTENCY\
        \ (NORMATIVE): - On replay with the same idempotency_key, the server MUST return the original\
        \ successful response payload,  including the original reservation_id (if any).\nTENANCY (NORMATIVE):\
        \  - subject.tenant MUST match the effective tenant derived from auth; otherwise the server MUST\
        \ return 403 FORBIDDEN."
      parameters:
      - $ref: '#/components/parameters/IdempotencyKeyHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ReservationCreateRequest'
      responses:
        '200':
          description: Reservation decision (ALLOW/DENY with optional caps)
          headers:
            X-Request-Id:
              $ref: '#/components/headers/X-Request-Id'
            X-Cycles-Tenant:
              $ref: '#/components/headers/X-Cycles-Tenant'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReservationCreateResponse'
        '400':
          $ref: '#/components/responses/ErrorResponse'
        '401':
          $ref: '#/components/responses/ErrorResponse'
        '403':
          $ref: '#/components/responses/ErrorResponse'
        '404':
          description: 'NOT_FOUND — no budget exists at any of the reservation''s derived scopes in any
            unit. The message field carries the specific "Budget not found for provided scope: ..." detail.
            Distinct from 400 UNIT_MISMATCH (a budget exists at the scope but in a different unit).'
          headers:
            X-Request-Id:
              $ref: '#/components/headers/X-Request-Id'
            X-Cycles-Tenant:
              $ref: '#/components/headers/X-Cycles-Tenant'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          $ref: '#/components/responses/ErrorResponse'
        '500':
          $ref: '#/components/responses/ErrorResponse'
    get:
      tags:
      - Reservations
      operationId: listReservations
      summary: List reservations (optional recovery/debug endpoint)
      description: |-
        Lists reservations visible to the effective tenant. This endpoint is OPTIONAL in v0 deployments.

        RECOVERY (NORMATIVE):
          - If a client loses reservation_id, it MAY recover it by querying with idempotency_key and/or subject filters.
          - If idempotency_key is provided, the server SHOULD return at most one matching reservation (uniqueness is expected per (effective tenant, endpoint, idempotency_key)).
          - Servers SHOULD support filtering by status=ACTIVE to identify "stuck" reservations.

        SUBJECT FILTERS (GUIDANCE):
          - Query parameters tenant/workspace/app/workflow/agent/toolset filter on the canonical Subject fields.
          - Filtering on Subject.dimensions is out of scope for v0 unless explicitly implemented by the server.

        TENANCY (NORMATIVE):
          - Under ApiKeyAuth: the server MUST scope results to the effective
            tenant derived from auth. If the tenant query parameter is
            provided, it is validation-only and MUST match the effective
            tenant; otherwise the server MUST return 403 FORBIDDEN. If
            tenant is omitted, the effective tenant is used.
          - Under AdminKeyAuth (added 2026-04-13): the admin caller has
            no effective tenant, so the tenant query parameter is REQUIRED
            and used as a FILTER (not validation). Omitting it MUST return
            400 INVALID_REQUEST with message "tenant query parameter is
            required when using admin key authentication". This matches
            the existing dual-auth pattern on listBudgets / listPolicies
            in the governance-admin spec — same single param, semantics
            keyed on auth type.
      security:
      - ApiKeyAuth: []
      - AdminKeyAuth: []
      parameters:
      - name: idempotency_key
        in: query
        required: false
        schema:
          $ref: '#/components/schemas/IdempotencyKey'
        description: Lookup handle to recover the reservation_id from a prior createReservation call.
      - name: status
        in: query
        required: false
        schema:
          $ref: '#/components/schemas/ReservationStatus'
        description: Filter by reservation status (e.g., ACTIVE).
      - name: tenant
        in: query
        required: false
        schema:
          type: string
      - name: workspace
        in: query
        required: false
        schema:
          type: string
      - name: app
        in: query
        required: false
        schema:
          type: string
      - name: workflow
        in: query
        required: false
        schema:
          type: string
      - name: agent
        in: query
        required: false
        schema:
          type: string
      - name: toolset
        in: query
        required: false
        schema:
          type: string
      - $ref: '#/components/parameters/Limit'
      - $ref: '#/components/parameters/Cursor'
      responses:
        '200':
          description: Reservations list
          headers:
            X-Request-Id:
              $ref: '#/components/headers/X-Request-Id'
            X-Cycles-Tenant:
              $ref: '#/components/headers/X-Cycles-Tenant'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReservationListResponse'
        '400':
          $ref: '#/components/responses/ErrorResponse'
        '401':
          $ref: '#/components/responses/ErrorResponse'
        '403':
          $ref: '#/components/responses/ErrorResponse'
        '500':
          $ref: '#/components/responses/ErrorResponse'
  /v1/reservations/{reservation_id}:
