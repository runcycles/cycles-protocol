  /v1/admin/budgets/fund:
    post:
      tags: [Budgets]
      operationId: fundBudget
      summary: Credit, debit, or adjust budget allocation
      description: >-
        Modifies budget allocation and remaining balance outside the
        reservation flow. Common operations:

        AUTHORIZATION:
        - ApiKeyAuth: Tenant can fund their own budgets only (scoped by authenticated tenant)
        - AdminKeyAuth: Accepted as alternative (dual-auth).
          When using AdminKeyAuth, tenant_id query parameter is REQUIRED for scoping.

        CREDIT (top-up):
        - allocated += amount
        - remaining += amount
        - Use for: monthly allocations, bonus credits

        DEBIT (drain):
        - allocated -= amount
        - remaining -= amount (fails if would go negative)
        - Use for: downgrades, refunds, policy enforcement

        RESET (resize allocated):
        - allocated = amount
        - remaining = amount - reserved - spent - debt
        - spent, reserved, debt all preserved
        - Use for: plan changes, limit adjustments, ceiling resize
        - NOT the operation for billing-period boundaries — see RESET_SPENT

        RESET_SPENT (new billing period):
        - allocated = amount
        - spent = (request.spent if supplied, else 0)
        - remaining = allocated - spent - reserved - debt
        - reserved preserved (active reservations straddle the period
          and will land in the new period's spent when they commit)
        - debt preserved (periods don't forgive debt; use REPAY_DEBT)
        - Optional `spent` field supports: migration from other billing
          systems (start with existing consumption), prorated mid-period
          signup, credit-back/compensation, state correction.
          Must be >= 0 when supplied. Default 0 covers routine period
          rollovers.
        - Emits `budget.reset_spent` event (distinct from `budget.reset`)
          with `spent_override_provided` flag so compliance dashboards
          can distinguish routine rollovers from explicit adjustments.

        REPAY_DEBT:
        - debt -= amount (use remaining if debt < amount)
        - Use for: manual debt reconciliation

        IDEMPOTENCY:
        - Required idempotency_key prevents double-funding
        - Replayed requests return original response
      security:
        - ApiKeyAuth: []
        - AdminKeyAuth: []
      parameters:
        - name: tenant_id
          in: query
          required: false
          description: >-
            When using ApiKeyAuth: ignored — the authenticated tenant from the
            API key is always used for scoping.
            When using AdminKeyAuth: REQUIRED — specifies which tenant's budget to fund.
            Returns 400 if missing when using AdminKeyAuth.
          schema:
            type: string
        - name: scope
          in: query
          required: true
          description: Canonical scope identifier, e.g., "tenant:acme" or "tenant:acme/workspace:prod"
          schema:
            type: string
        - name: unit
          in: query
          required: true
          schema:
            type: string
            enum: [USD_MICROCENTS, TOKENS, CREDITS, RISK_POINTS]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BudgetFundingRequest'
      responses:
        '200':
          description: Funding operation completed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BudgetFundingResponse'
        '400':
          description: Missing tenant_id when using AdminKeyAuth
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Missing or invalid API key / admin key
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: API key lacks budgets:write permission or scope_filter denies access
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Budget ledger not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Idempotency mismatch, insufficient funds for DEBIT, or budget is frozen/closed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /v1/admin/budgets/lookup:
    get:
      tags: [Budgets]
      operationId: lookupBudget
      summary: Look up a single budget by exact scope and unit
      description: >-
        Returns a single budget ledger matching the exact (scope, unit) pair.
        Unlike listBudgets which uses scope_prefix (prefix match), this endpoint
        performs exact scope matching — the budget is uniquely identified by
        the (scope, unit) pair.

        AUTHORIZATION:
        - ApiKeyAuth: scope_filter is enforced; only accessible if scope matches key's filter.
        - AdminKeyAuth: Accepted as alternative (dual-auth).
          No tenant_id required — the budget is uniquely identified by (scope, unit).
      security:
        - ApiKeyAuth: []
        - AdminKeyAuth: []
      parameters:
        - name: scope
          in: query
          required: true
          description: Exact canonical scope identifier, e.g., "tenant:acme/workspace:prod"
          schema:
            type: string
        - name: unit
          in: query
          required: true
          schema:
            $ref: '#/components/schemas/UnitEnum'
      responses:
        '400':
          description: Bad request (malformed JSON, missing required fields, invalid enum, etc.)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '200':
          description: Budget ledger found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BudgetLedger'
        '401':
          description: Missing or invalid API key / admin key
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: API key lacks budgets:read permission or scope_filter denies access
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: No budget exists for this (scope, unit) pair
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /v1/admin/policies:
    post:
      tags: [Policies]
      operationId: createPolicy
      summary: Create a policy with caps and limits
      description: >-
        Defines caps (soft-landing constraints) and rate limits for scopes.
        Policies are evaluated during reservation requests.

        AUTHORIZATION:
        - ApiKeyAuth (X-Cycles-API-Key): tenant creates policies for their
          own scopes only. tenant_id is implicit from the authenticated key
          and MUST NOT appear in the request body.
        - AdminKeyAuth (X-Admin-API-Key): admin operator creates a policy
          on behalf of a tenant. tenant_id is REQUIRED in the request body.
          Audit log records actor_type=ADMIN_ON_BEHALF_OF. Matches the
          existing dual-auth pattern on read endpoints.

        SCOPE PATTERNS:
        - "tenant:acme-corp" (exact match)
        - "tenant:acme-corp/*" (all descendants)
        - "agent:*" (all agents system-wide)
        - "*/agent:summarizer" (agent across all tenants)

        PRIORITY:
        - Higher priority policies override lower priority
        - If multiple policies match, highest priority wins

        EFFECTIVE DATES:
        - Optional time-bounded policies
        - Useful for temporary restrictions or trials
      security:
        - ApiKeyAuth: []
        - AdminKeyAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PolicyCreateRequest'
      responses:
        '400':
          description: Bad request (malformed JSON, missing required fields, invalid enum, etc.)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '201':
          description: Policy created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Policy'
        '401':
          description: Missing or invalid API key
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: API key lacks policies:write permission or scope_filter denies access
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Policy with same name already exists (DUPLICATE_RESOURCE)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    get:
      tags: [Policies]
      operationId: listPolicies
      summary: List policies
      description: >-
        AUTHORIZATION:
        - ApiKeyAuth: Tenant can list their own policies only (scoped by authenticated tenant)
        - AdminKeyAuth: Accepted as alternative for read access (dual-auth).
