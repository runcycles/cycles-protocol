                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: >-
            Owning tenant is CLOSED (`TENANT_CLOSED`). Terminal-owner
            mutation guard per CASCADE SEMANTICS Rule 2 — admin-plane
