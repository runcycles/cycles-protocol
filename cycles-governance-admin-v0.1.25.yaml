  # ==========================================================================
  # PILLAR 3: BALANCE QUERIES (admin-plane view)
  # ==========================================================================
  # Reservation lifecycle endpoints (POST /v1/reservations, POST /v1/reservations/{id}/commit,
  # POST /v1/reservations/{id}/release, POST /v1/reservations/{id}/extend, GET /v1/reservations)
  # are runtime-plane only — fully defined in cycles-protocol-v0.yaml and served by the
  # runtime enforcement service. They are NOT part of the admin API surface.
  #
  # The /v1/balances endpoint below is the admin-plane balance query, served by the admin
  # service with admin-scoped parameters (tenant_id, scope_prefix, unit).

  /v1/balances:
    get:
      tags: [Balances]
      operationId: getBalances
      x-conformance: normative
      summary: Query budget balances (admin-plane view)
      description: >-
        Returns budget ledger balances for the authenticated tenant, with
        optional filtering by scope prefix and unit. This is the admin-plane
        balance query — the runtime-plane equivalent with subject-based
        filtering is defined in cycles-protocol-v0.yaml.

        ADMIN-PLANE SEMANTICS:
        - Returns full ledger state including debt, overdraft_limit, is_over_limit
        - Scoped to effective tenant (derived from API key)
        - Supports scope_prefix filtering (prefix match on canonical scope)
        - Supports unit filtering
      security:
        - ApiKeyAuth: []
      parameters:
        - name: tenant_id
          in: query
          schema:
            type: string
        - name: scope_prefix
          in: query
          schema:
            type: string
          description: Filter by scope prefix
        - name: unit
          in: query
          schema:
            type: string
            enum: [USD_MICROCENTS, TOKENS, CREDITS, RISK_POINTS]
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
            minimum: 1
            maximum: 100
        - name: cursor
          in: query
          schema:
            type: string
      responses:
        '400':
          description: Bad request (malformed JSON, missing required fields, invalid enum, etc.)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '200':
          description: Budget ledgers matching the query filters
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BalanceListResponse'
        '401':
          description: Missing or invalid API key
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Scope denied by scope_filter or insufficient permissions
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
