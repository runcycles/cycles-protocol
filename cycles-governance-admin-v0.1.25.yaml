  # --------------------------------------------------------------------------
  # PILLAR 4: TENANT WEBHOOK SELF-SERVICE
  # --------------------------------------------------------------------------

  /v1/webhooks:
    post:
      tags: [Webhooks]
      operationId: createTenantWebhook
      summary: Create a webhook for the authenticated tenant
      description: >-
        Tenant-scoped webhook creation. The subscription is automatically scoped
        to the authenticated tenant. Tenants can only subscribe to tenant-accessible
        event types: budget.*, reservation.*, tenant.* (26 of 40 types).

        api_key.*, policy.*, and system.* events require admin access.

        PERMISSIONS:
        - Requires webhooks:write permission on the API key.
      security:
        - ApiKeyAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/WebhookCreateRequest'
      responses:
        '201':
          description: Subscription created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WebhookCreateResponse'
        '401':
          description: Missing or invalid API key
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '400':
          description: Invalid request (non-HTTPS URL, restricted event type, etc.)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: API key lacks webhooks:write permission
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    get:
      tags: [Webhooks]
      operationId: listTenantWebhooks
      summary: List webhooks for the authenticated tenant (or a specified tenant under admin auth)
      description: >-
        Returns webhook subscriptions scoped by the authenticated caller.

        TENANCY (NORMATIVE):
          - Under ApiKeyAuth: results are scoped to the effective tenant
            derived from auth. The `tenant` query parameter MUST NOT be
            set (or, if accepted, is validation-only and MUST match the
            effective tenant).
          - Under AdminKeyAuth: admin has no effective
            tenant. The `tenant` query parameter is REQUIRED as a FILTER.
            Omitting it MUST return 400 INVALID_REQUEST with message
            "tenant query parameter is required when using admin key
            authentication". Same single-param dual-semantic pattern as
            listBudgets / listPolicies / listReservations.

        PERMISSIONS:
        - ApiKeyAuth: requires webhooks:read permission on the API key.
        - AdminKeyAuth: no permission check beyond admin key validity.
      security:
        - ApiKeyAuth: []
        - AdminKeyAuth: []
      parameters:
        - name: tenant
          in: query
          required: false
          description: >-
            Under AdminKeyAuth: REQUIRED — specifies which tenant's
            webhooks to list. Under ApiKeyAuth: MUST NOT be set (the
            authenticated key's tenant is used).
          schema:
            type: string
        - name: status
          in: query
          schema:
            type: string
            enum: [ACTIVE, PAUSED, DISABLED]
        - name: cursor
          in: query
          schema:
            type: string
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 50
      responses:
        '400':
          description: Bad request (malformed JSON, missing required fields, invalid enum, etc.)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '200':
          description: Subscription list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WebhookListResponse'
        '401':
          description: Missing or invalid API key
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: API key lacks webhooks:read permission
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /v1/webhooks/{subscription_id}:
    get:
      tags: [Webhooks]
      operationId: getTenantWebhook
      summary: Get a tenant's webhook subscription
      description: >-
        Returns webhook details.

        TENANCY:
          - Under ApiKeyAuth: returns 404 if the subscription belongs to
            a different tenant (cross-tenant reads look like not-found,
            not forbidden).
          - Under AdminKeyAuth: the owning tenant is
            resolved from the subscription record; admin can read any
            tenant's subscription. 404 only when no subscription exists
            with the given id.

        PERMISSIONS:
        - ApiKeyAuth: requires webhooks:read permission on the API key.
        - AdminKeyAuth: no permission check beyond admin key validity.
      security:
        - ApiKeyAuth: []
        - AdminKeyAuth: []
      parameters:
        - name: subscription_id
          in: path
          required: true
          schema:
            type: string
      responses:
        '400':
          description: Bad request (malformed JSON, missing required fields, invalid enum, etc.)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '200':
          description: Subscription details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WebhookSubscription'
        '401':
          description: Missing or invalid API key
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: API key lacks webhooks:read permission
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Subscription not found or belongs to different tenant
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    patch:
      tags: [Webhooks]
      operationId: updateTenantWebhook
      summary: Update a tenant's webhook subscription
      description: >-
        Partial update — only provided fields are modified. Restricted to tenant-accessible event types.

        TENANCY:
          - Under ApiKeyAuth: 404 on cross-tenant subscription.
          - Under AdminKeyAuth: owning tenant resolved from
            the subscription record. Primary ops use case is pausing a
            flapping webhook (status=PAUSED).

        AUDIT (NORMATIVE under AdminKeyAuth):
          - Admin-driven updates MUST record actor_type=admin_on_behalf_of
            in the shared audit store so the governance audit-query
            surface lists them alongside other admin-on-behalf-of
            actions. Callers SHOULD include a structured reason in the
            request body's `metadata` (e.g., `{"reason": "[WEBHOOK_PAUSE]
            incident INC-1234"}`) for grep-ability.

        PERMISSIONS:
        - ApiKeyAuth: requires webhooks:write permission on the API key.
        - AdminKeyAuth: no permission check beyond admin key validity.
      security:
        - ApiKeyAuth: []
        - AdminKeyAuth: []
      parameters:
        - name: subscription_id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/WebhookUpdateRequest'
      responses:
        '200':
          description: Subscription updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WebhookSubscription'
        '401':
          description: Missing or invalid API key
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '400':
          description: Invalid update (restricted event type, invalid URL, etc.)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: API key lacks webhooks:write permission
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Subscription not found or belongs to different tenant
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    delete:
      tags: [Webhooks]
      operationId: deleteTenantWebhook
      summary: Delete a tenant's webhook subscription
      description: >-
        Permanently removes the subscription. Pending deliveries for this subscription will fail.

        TENANCY:
          - Under ApiKeyAuth: 404 on cross-tenant subscription.
          - Under AdminKeyAuth: owning tenant resolved from
            the subscription record. Primary ops use case is force-removing
            a webhook that a tenant refuses to fix and is impacting
            shared infrastructure.

        AUDIT (NORMATIVE under AdminKeyAuth):
          - Admin-driven deletes MUST record actor_type=admin_on_behalf_of
            in the shared audit store. Callers SHOULD populate a
            structured reason (e.g., `[WEBHOOK_FORCE_DELETE] abuse-report-42`)
            in the audit entry metadata for traceability.

        PERMISSIONS:
        - ApiKeyAuth: requires webhooks:write permission on the API key.
        - AdminKeyAuth: no permission check beyond admin key validity.
      security:
        - ApiKeyAuth: []
        - AdminKeyAuth: []
      parameters:
        - name: subscription_id
          in: path
          required: true
          schema:
            type: string
      responses:
        '400':
          description: Bad request (malformed JSON, missing required fields, invalid enum, etc.)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '204':
          description: Subscription deleted
        '401':
          description: Missing or invalid API key
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: API key lacks webhooks:write permission
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Subscription not found or belongs to different tenant
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /v1/webhooks/{subscription_id}/test:
    post:
      tags: [Webhooks]
      operationId: testTenantWebhook
      summary: Send a test event to a tenant's webhook
      description: >-
        Sends a synthetic system.webhook_test event. Does not count toward consecutive failures.

        TENANCY:
          - Under ApiKeyAuth: 404 on cross-tenant subscription.
          - Under AdminKeyAuth: owning tenant resolved from
            the subscription record. Primary ops use case is verifying
            that a paused/failing webhook is reachable after the tenant
            fixes their endpoint, before flipping status back to ACTIVE.

        AUDIT: test events are not required to produce an audit entry
        under AdminKeyAuth (diagnostic, idempotent, non-state-mutating
        on the subscription itself); a delivery record is created as
        usual. Servers MAY still log for operational visibility.

        PERMISSIONS:
        - ApiKeyAuth: requires webhooks:write permission on the API key.
        - AdminKeyAuth: no permission check beyond admin key validity.
      security:
        - ApiKeyAuth: []
        - AdminKeyAuth: []
      parameters:
        - name: subscription_id
          in: path
          required: true
          schema:
            type: string
      responses:
        '400':
          description: Bad request (malformed JSON, missing required fields, invalid enum, etc.)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '200':
          description: Test result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WebhookTestResponse'
        '401':
          description: Missing or invalid API key
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: API key lacks webhooks:write permission
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Subscription not found or belongs to different tenant
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /v1/webhooks/{subscription_id}/deliveries:
    get:
      tags: [Webhooks]
      operationId: listTenantWebhookDeliveries
      summary: List delivery attempts for a tenant's webhook
      description: >-
        Returns delivery history with status, response codes, and error details.
        Supports filtering by status and date range.

        TENANCY:
          - Under ApiKeyAuth: 404 on cross-tenant subscription.
          - Under AdminKeyAuth: owning tenant resolved from
            the subscription record. Primary ops use case is diagnosing
            which specific delivery failures tripped the auto-disable
            threshold (drill down from the PATCH pause flow).

        PERMISSIONS:
        - ApiKeyAuth: requires webhooks:read permission on the API key.
        - AdminKeyAuth: no permission check beyond admin key validity.
      security:
        - ApiKeyAuth: []
        - AdminKeyAuth: []
      parameters:
        - name: subscription_id
          in: path
          required: true
          schema:
            type: string
        - name: status
          in: query
          schema:
            type: string
            enum: [PENDING, SUCCESS, FAILED, RETRYING]
        - name: from
          in: query
          schema:
            type: string
            format: date-time
        - name: to
          in: query
          schema:
            type: string
            format: date-time
        - name: cursor
          in: query
          schema:
            type: string
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 50
      responses:
        '400':
          description: Bad request (malformed JSON, missing required fields, invalid enum, etc.)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '200':
          description: Delivery list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WebhookDeliveryListResponse'
        '401':
          description: Missing or invalid API key
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: API key lacks webhooks:read permission
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Subscription not found or belongs to different tenant
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /v1/events:
    get:
      tags: [Events]
      operationId: listTenantEvents
      summary: Query events for the authenticated tenant
      description: >-
