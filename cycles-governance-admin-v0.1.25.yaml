    post:
      tags: [Webhooks]
      operationId: replayEvents
      summary: Replay events to a webhook subscription
      description: >-
        Re-delivers historical events to the subscription's endpoint.
        Useful for recovering from outages or backfilling a new subscription.

        BEHAVIOR:
        - Events are delivered in chronological order.
        - Each delivery is tracked as a new WebhookDelivery with source "replay".
        - Replay respects the subscription's retry policy.
        - Concurrent replays to the same subscription are NOT allowed.

        LIMITS:
        - Maximum 1000 events per replay request.
        - Use from/to to control the replay window.
      security:
        - AdminKeyAuth: []
      parameters:
        - name: subscription_id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                from:
                  type: string
                  format: date-time
                  description: Start of replay window (inclusive)
                to:
                  type: string
                  format: date-time
                  description: End of replay window (inclusive)
                event_types:
                  type: array
                  items:
                    $ref: '#/components/schemas/EventType'
                  description: >-
                    Optional filter — only replay these event types.
                    If omitted, replays all event types the subscription is subscribed to.
                max_events:
                  type: integer
                  minimum: 1
                  maximum: 1000
                  default: 100
                  description: Maximum number of events to replay
      responses:
        '202':
          description: Replay accepted (processing asynchronously)
          content:
            application/json:
              schema:
                type: object
                properties:
                  replay_id:
                    type: string
                    description: Unique ID for this replay operation
                  events_queued:
                    type: integer
                    description: Number of events queued for replay
                  estimated_completion_seconds:
                    type: integer
        '401':
          description: Missing or invalid admin API key
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '400':
          description: Invalid replay request
          content:
            application/json:
              schema:
