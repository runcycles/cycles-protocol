  /v1/admin/budgets/bulk-action:
    post:
      tags: [Budgets]
      operationId: bulkActionBudgets
      x-conformance: reference
      summary: Apply a balance-mutation to every budget matching a filter
      description: >-
        Apply CREDIT, DEBIT, RESET, RESET_SPENT, or REPAY_DEBT to every
        budget ledger matching the provided filter in a single
        synchronous request. Mirrors /v1/admin/tenants/bulk-action and
        /v1/admin/webhooks/bulk-action in body shape, safety semantics
        (expected_count gate, idempotency_key, 500-row hard cap), and
        per-row outcome envelope. Resolves the operational pain
        described in cycles-server-admin issue #99: "Bulk Budget Reset
        at Tenant or Parent-Scope Level" — when a billing period rolls
        over, operators no longer iterate listBudgets + per-row
        fundBudget; they issue one bulk request scoped by tenant_id
        and (optionally) scope_prefix.

        OPERATION-DISCRIMINATED REQUEST:
        - The `action` enum names which balance-mutation to apply
          uniformly across the matched set. The action determines
          which payload fields are required:
          * CREDIT, DEBIT, RESET, REPAY_DEBT: require `amount`.
          * RESET_SPENT: requires `amount`; `spent` optional (defaults to 0).
        - Operation semantics MATCH BudgetFundingRequest exactly so
          there is one place to read the per-operation balance math.
          Anything fundBudget can do to one ledger, this endpoint can
          do to a filtered set.
        - Server MUST validate the action/payload combination BEFORE
          counting matches or mutating any row; an invalid combination
          → HTTP 400, no writes.

        FILTER SEMANTICS:
        - Filter block mirrors the query params of listBudgets
          (scope_prefix, unit, status, over_limit, has_debt,
          utilization_min/max, search), AND combination, ILIKE match
          on search. Operators preview the affected set by issuing
          GET /v1/admin/budgets with the same filter before invoking
          bulk-action and populating expected_count from the count.
        - `tenant_id` is REQUIRED (cross-tenant safety — see
          BudgetBulkFilter). Cascading reset across a scope subtree
          uses `scope_prefix`; no separate `cascade` flag.

        SAFETY:
        - expected_count gate: server counts before mutation;
          mismatch → 409 COUNT_MISMATCH with no writes. See
          bulkActionTenants for full rationale (operator preview
          drifted; refuse rather than over-apply).
        - idempotency_key: 15-min replay window; repeat submits
          return the original response without re-applying.
        - HARD LIMIT: 500 matching rows. Larger filters → HTTP 400
          LIMIT_EXCEEDED. Operators with > 500 budgets in a
          rollover batch must partition by scope_prefix (the natural
          partition for cascading resets).
        - Overall HTTP 200 even when some rows fail; response
          envelope reports succeeded / failed / skipped counts.
          Common per-row failure codes: BUDGET_EXCEEDED (DEBIT would
          take remaining negative), INVALID_TRANSITION (unit
          mismatch, ledger CLOSED).

        EVENTS (document revision 0.1.25.32):
        - Server MUST emit one Event per successfully-mutated row,
          typed by action:
          * CREDIT → `budget.funded`
          * DEBIT → `budget.debited`
          * RESET → `budget.reset`
          * RESET_SPENT → `budget.reset_spent`
          * REPAY_DEBT → `budget.debt_repaid`
          Skipped rows (idempotent no-ops) and failed rows MUST NOT
          produce an Event — emission is bound to actual balance
          mutation, matching the single-op fundBudget path.
        - Each emitted Event carries
          `correlation_id = budget_bulk_action:<action>:<request_id>`
          (action lowercased, e.g. `budget_bulk_action:credit:req_abc`).
          Operators retrieve the full bulk fan-out via
          GET /v1/admin/events?correlation_id=…; the shared
          request_id also ties every emitted row to the invocation's
          single AuditLogEntry.

        AUDIT LOG:
        - One AuditLogEntry per bulk-action invocation (not per
          row). The entry records actor_type=ADMIN_ON_BEHALF_OF,
          tenant_id from the filter, operation=bulkActionBudgets,
          and embeds the full per-row outcome (succeeded / failed /
          skipped ledger_ids) in the entry payload so security
          review can reconstruct exactly what was changed without
          replaying the bulk request.

        AUTHORIZATION:
        - AdminKeyAuth only. Tenants cannot bulk-mutate their own
          budgets via this endpoint; per-budget mutation remains
          available via fundBudget.
      security:
        - AdminKeyAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BudgetBulkActionRequest'
      responses:
        '200':
          description: Bulk action applied (may include per-row failures)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BudgetBulkActionResponse'
        '400':
          description: >-
            Malformed request, unknown action, missing required
            payload field for the chosen action (e.g. CREDIT without
            amount), search too long, utilization_min >
            utilization_max, or LIMIT_EXCEEDED (total_matched > 500).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Missing or invalid admin API key
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: tenant_id in filter does not exist
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: >-
            COUNT_MISMATCH — server-counted matches differ from
            client-supplied expected_count. No writes performed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /v1/admin/policies:
    post:
      tags: [Policies]
      operationId: createPolicy
      x-conformance: reference
      summary: Create a policy with caps and limits
      description: >-
        Defines caps (soft-landing constraints) and rate limits for scopes.
        Policies are evaluated during reservation requests.

        AUTHORIZATION:
        - ApiKeyAuth (X-Cycles-API-Key): tenant creates policies for their
          own scopes only. tenant_id is implicit from the authenticated key
          and MUST NOT appear in the request body.
        - AdminKeyAuth (X-Admin-API-Key): admin operator creates a policy
          on behalf of a tenant. tenant_id is REQUIRED in the request body.
          Audit log records actor_type=ADMIN_ON_BEHALF_OF. Matches the
          existing dual-auth pattern on read endpoints.

        SCOPE PATTERNS:
        - "tenant:acme-corp" (exact match)
        - "tenant:acme-corp/*" (all descendants)
        - "agent:*" (all agents system-wide)
        - "*/agent:summarizer" (agent across all tenants)

        PRIORITY:
        - Higher priority policies override lower priority
        - If multiple policies match, highest priority wins

        EFFECTIVE DATES:
        - Optional time-bounded policies
        - Useful for temporary restrictions or trials
      security:
        - ApiKeyAuth: []
        - AdminKeyAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PolicyCreateRequest'
      responses:
        '400':
          description: Bad request (malformed JSON, missing required fields, invalid enum, etc.)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '201':
          description: Policy created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Policy'
        '401':
          description: Missing or invalid API key
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: API key lacks policies:write permission or scope_filter denies access
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Policy with same name already exists (DUPLICATE_RESOURCE)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    get:
      tags: [Policies]
      operationId: listPolicies
      x-conformance: reference
      summary: List policies
      description: >-
        AUTHORIZATION:
        - ApiKeyAuth: Tenant can list their own policies only (scoped by authenticated tenant)
        - AdminKeyAuth: Accepted as alternative for read access (dual-auth).
          When using AdminKeyAuth, tenant_id query parameter is REQUIRED for scoping.
      security:
        - ApiKeyAuth: []
        - AdminKeyAuth: []
      parameters:
        - name: tenant_id
          in: query
          required: false
          description: >-
            When using ApiKeyAuth: ignored — the authenticated tenant from the
            API key is always used for scoping.
            When using AdminKeyAuth: REQUIRED — specifies which tenant's policies to list.
            Returns 400 if missing when using AdminKeyAuth.
          schema:
            type: string
        - name: scope_pattern
          in: query
          schema:
            type: string
        - name: status
          in: query
          schema:
            type: string
            enum: [ACTIVE, DISABLED]
        - name: has_action_quotas
          in: query
          description: >-
            Optional. Filter to policies that have at least one action
            quota configured. Only meaningful on servers implementing the
            v0.1.26 action-quotas extension. Servers that don't recognize
            this parameter MUST ignore it without error (additive-parameter
            guarantee).
          schema:
            type: boolean
        - name: references_action_kind
          in: query
          description: >-
            Optional. Filter to policies that mention the given
            action_kind in any quota rule or access control list. Enables
            incident investigation ("which policies block payment.charge?").
            Only meaningful on servers implementing the v0.1.26
            action-kinds extension. Servers that don't recognize this
            parameter MUST ignore it without error (additive-parameter
            guarantee).
          schema:
            type: string
            maxLength: 64
        - name: cursor
          in: query
          schema:
            type: string
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
      responses:
        '200':
          description: Policy list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PolicyListResponse'
        '400':
          description: Missing tenant_id when using AdminKeyAuth
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Missing or invalid API key / admin key
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: API key lacks policies:read permission or scope_filter denies access
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /v1/admin/policies/{policy_id}:
    patch:
      tags: [Policies]
      operationId: updatePolicy
      x-conformance: reference
      summary: Update policy properties
      description: >-
        Update any mutable field on an existing policy.

        AUTHORIZATION:
        - ApiKeyAuth: tenant scoping enforced — only the owning tenant
          can update.
        - AdminKeyAuth: admin operator can update policies on behalf of
          any tenant. Server validates that the policy belongs to the
          tenant owning the path-resolved policy_id; no tenant_id is
          needed in the body because policy_id already pins it. Audit
          log records actor_type=ADMIN_ON_BEHALF_OF.
      security:
        - ApiKeyAuth: []
        - AdminKeyAuth: []
      parameters:
        - name: policy_id
          in: path
          required: true
          schema: {type: string}
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              properties:
                name: {type: string}
                description: {type: string}
                priority: {type: integer}
                caps: {$ref: '#/components/schemas/Caps'}
                commit_overage_policy: {$ref: '#/components/schemas/CommitOveragePolicy'}
                reservation_ttl_override: {$ref: '#/components/schemas/ReservationTtlOverride'}
                rate_limits: {$ref: '#/components/schemas/RateLimits'}
                effective_from: {type: string, format: date-time}
                effective_until: {type: string, format: date-time}
                status: {type: string, enum: [ACTIVE, DISABLED]}
      responses:
        '400':
          description: Bad request (malformed JSON, missing required fields, invalid enum, etc.)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '200':
          description: Policy updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Policy'
        '401':
          description: Missing or invalid API key
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: API key lacks policies:write permission or scope_filter denies access
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Policy not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: >-
            Owning tenant is CLOSED (`TENANT_CLOSED`). Terminal-owner
            mutation guard per CASCADE SEMANTICS Rule 2 — a policy
            whose owning tenant has been CLOSED is read-only.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  # ==========================================================================
  # PILLAR 2: AUTHENTICATION & AUTHORIZATION
  # ==========================================================================
  /v1/admin/api-keys:
    post:
      tags: [API Keys]
      operationId: createApiKey
      x-conformance: reference
      summary: Create an API key for a tenant
      description: >-
        Provisions a new API key bound to a tenant. This is the only time
        the full key secret is returned. Store it securely.

        KEY FORMAT:
        - Prefix: cyc_live_{random} or cyc_test_{random}
        - Random part: 32 characters, cryptographically random
        - Stored as: bcrypt hash of full key

        PERMISSIONS:
        - Default for tenant keys: [reservations:create, reservations:commit,
          reservations:release, reservations:extend, reservations:list,
          balances:read, budgets:read, budgets:write, policies:read,
          policies:write]
        - Webhook/event self-service requires explicit opt-in:
          webhooks:read, webhooks:write, events:read are NOT in the default set.
        - This endpoint provisions tenant-scoped API keys only. The admin key
          (X-Admin-API-Key) is configured at the server level, not provisioned
          through this endpoint.
        - Admin permissions (admin:read, admin:write, and granular admin
          permissions like admin:tenants:read) are accepted for backward
          compatibility but SHOULD NOT be assigned to new tenant keys.
          Use the granular tenant permissions instead.
        - Can be restricted to specific scopes via scope_filter

        EXPIRY:
        - Recommended: 90 days for security
        - Can be set indefinitely but not recommended
        - Expired keys auto-fail validation
      security:
        - AdminKeyAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ApiKeyCreateRequest'
      responses:
        '201':
          description: API key created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiKeyCreateResponse'
        '401':
          description: Missing or invalid admin API key
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '400':
          description: Invalid tenant or permissions
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: >-
            Target tenant is CLOSED (`TENANT_CLOSED`). Terminal-owner
            mutation guard per CASCADE SEMANTICS Rule 2 — API keys
            cannot be minted for a CLOSED tenant.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    get:
      tags: [API Keys]
      operationId: listApiKeys
      x-conformance: reference
      summary: List API keys
      description: >-
        Returns API keys, optionally filtered by tenant. Full key
        secrets are never returned, only prefixes and metadata.

        AUTHORIZATION:
        - AdminKeyAuth: admin operator lists keys. tenant_id is OPTIONAL.
          When omitted, returns keys across all tenants (cursor-paginated).
          When provided, scopes the result to that tenant.
      security:
        - AdminKeyAuth: []
      parameters:
        - name: tenant_id
          in: query
          required: false
          description: >-
            Optional tenant filter. When omitted under AdminKeyAuth,
            returns keys across all tenants. When provided, scopes the
            result to the specified tenant.
          schema:
            type: string
        - name: status
          in: query
          schema:
            type: string
            enum: [ACTIVE, REVOKED, EXPIRED]
        - name: search
          in: query
          description: >-
            Free-text case-insensitive substring match. Matches across:
            key_id, name. Combined with other filter params using
            AND semantics. Additive parameter — servers that don't
            recognize it MUST ignore without error (additive-parameter
            guarantee).
            Empty string MUST be treated as absent. Max length 128
            characters; longer values MUST be rejected with HTTP 400.
          schema:
            type: string
            maxLength: 128
        - name: sort_by
          in: query
          description: >-
            Sort key. When provided, results are returned in the requested
            order and the returned cursor encodes the sort key so "Load
            more" continues in sort order. When omitted, servers use
            their existing default ordering. Servers that don't
            recognize the parameter MUST ignore it without error
            (additive-parameter guarantee).
          schema:
            type: string
            enum: [key_id, name, tenant_id, status, created_at, expires_at]
            default: created_at
        - name: sort_dir
          in: query
          description: Sort direction. Default descending.
          schema:
            $ref: '#/components/schemas/SortDirection'
        - name: cursor
          in: query
          schema:
            type: string
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
      responses:
        '400':
          description: Bad request (malformed JSON, missing required fields, invalid enum, etc.)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '200':
          description: API key list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiKeyListResponse'
        '401':
          description: Missing or invalid admin API key
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /v1/admin/api-keys/{key_id}:
    patch:
      tags: [API Keys]
      operationId: updateApiKey
      x-conformance: reference
      summary: Update API key properties
      description: >-
        Partial update — only provided fields are modified. Allows changing
        permissions, scope restrictions, and metadata without rotating the
        key secret.

        MUTABLE FIELDS:
        - permissions: Replace the full permission set
        - scope_filter: Replace scope restrictions
        - name, description, metadata: Update display/tagging info

        IMMUTABLE FIELDS:
        - tenant_id, key_id, key_prefix, key_hash, expires_at, status
        - To change expiry: revoke and recreate
        - To change tenant: revoke and recreate

        EVENTS:
        - Emits api_key.permissions_changed when permissions or scope_filter change.
      security:
        - AdminKeyAuth: []
      parameters:
        - name: key_id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              properties:
                name:
                  type: string
                  maxLength: 256
                description:
                  type: string
                  maxLength: 1024
                permissions:
                  type: array
                  items:
                    $ref: '#/components/schemas/Permission'
                scope_filter:
                  type: array
                  items:
                    type: string
                metadata:
                  type: object
                  additionalProperties: true
      responses:
        '200':
          description: Key updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiKey'
        '400':
          description: Invalid request (e.g., unrecognized permission name, unknown fields)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Missing or invalid admin API key
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Key not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Key is revoked or expired (cannot modify)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    delete:
      tags: [API Keys]
      operationId: revokeApiKey
      x-conformance: reference
      summary: Revoke an API key
      description: >-
        Immediately revokes a key. The key will fail validation from this
        point forward. Active reservations using this key can still be
        committed/released, but no new operations are permitted.

        REVOCATION IS PERMANENT:
        - Cannot be undone
        - Revoked keys remain in database for audit trail
        - Status transitions: ACTIVE → REVOKED
      security:
        - AdminKeyAuth: []
      parameters:
        - name: key_id
          in: path
          required: true
          schema:
            type: string
        - name: reason
          in: query
          schema:
            type: string
            maxLength: 512
      responses:
        '400':
          description: Bad request (malformed JSON, missing required fields, invalid enum, etc.)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '200':
          description: Key revoked
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiKey'
        '401':
          description: Missing or invalid admin API key
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Key not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: API key already revoked (ALREADY_REVOKED)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /v1/auth/validate:
    post:
      tags: [Authentication]
      operationId: validateApiKey
      x-conformance: reference
      summary: Validate an API key and resolve tenant
      description: >-
        Internal endpoint used by runtime enforcement layer to validate
        keys and derive effective tenant.

        VALIDATION CHECKS:
        1. Key exists in database
        2. Key hash matches
        3. Status is ACTIVE (not REVOKED or EXPIRED)
        4. Current time < expires_at
        5. Tenant is ACTIVE (not SUSPENDED or CLOSED)

        RESPONSE:
        - If valid: returns tenant_id, permissions, scope_filter
        - If invalid: returns valid=false with reason

        CACHING:
        - Results should be cached with short TTL (60s)
        - Invalidate cache on key revocation
      security:
        - AdminKeyAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ApiKeyValidationRequest'
      responses:
        '400':
          description: Bad request (malformed JSON, missing required fields, invalid enum, etc.)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '200':
          description: Validation result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiKeyValidationResponse'

        '401':
          description: Missing or invalid admin API key
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /v1/auth/introspect:
    get:
      tags: [Dashboard]
      operationId: introspectAuth
      x-conformance: normative
      summary: Introspect authenticated credential and return effective capabilities
      description: >-
        Returns the effective permissions and derived capabilities for the
        authenticated credential. Used by admin dashboards and by
        multi-role dashboards that accept both admin and tenant API keys
        to determine which pages/features the current user can access.

        AUTH:
        - AdminKeyAuth: returns auth_type="admin", permissions=["*"],
          capabilities with all flags true. tenant_id and scope_filter MUST
          be absent.
        - ApiKeyAuth: returns auth_type="tenant", permissions=[concrete
          Permission values], tenant_id=<key's tenant>, scope_filter=<key's
          filter if any>, capabilities derived from permissions per the
          NORMATIVE table in AuthIntrospectResponse.capabilities.

        CAPABILITIES:
        - Derived from raw permissions — the frontend uses booleans for UI
          gating. Admin auth yields all-true; tenant auth yields a subset
          per the published derivation table.

        BACKWARD COMPATIBILITY:
        - Servers that do not implement ApiKeyAuth on this endpoint
          (either because they pre-date the tenant-introspect contract,
          or because deployment policy disables it) SHOULD return 401 on
          ApiKeyAuth. Clients MUST handle 401 gracefully — a 401 on
          introspect means "this key has no accessible dashboard surface,"
          regardless of why.
      security:
        - AdminKeyAuth: []
        - ApiKeyAuth: []
      responses:
        '400':
          description: Bad request (malformed JSON, missing required fields, invalid enum, etc.)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '200':
          description: Authentication introspection result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthIntrospectResponse'
        '401':
          description: Missing or invalid API key / admin key (or server does not implement ApiKeyAuth on this endpoint — see BACKWARD COMPATIBILITY)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /v1/admin/audit/logs:
    get:
      tags: [Audit]
      operationId: listAuditLogs
      x-conformance: reference
      summary: Query audit logs
      description: >-
        Returns audit trail of all authenticated operations.
        Essential for compliance (SOC2, GDPR, etc.).

        RETENTION:
        - Recommended: 90 days hot, 1 year cold storage
        - Critical for security incident investigation

        FILTERING:
        - By tenant, key, time range, operation, status
        - Supports complex queries for forensics
      security:
        - AdminKeyAuth: []
      parameters:
        - name: tenant_id
          in: query
          description: >-
            Filter by exact tenant id. Accepts the two documented
            sentinels in addition to real tenant ids:
            `?tenant_id=__admin__` surfaces admin-plane activity;
            `?tenant_id=__unauth__` surfaces the failed-pre-auth
            stream. See `AuditLogEntry.tenant_id` for full sentinel
            semantics.
          schema:
            type: string
        - name: key_id
          in: query
          schema:
            type: string
        - name: operation
          in: query
          description: >-
            Filter by operation ID. Exact-or-IN-list. Formal wire
            contract is the `explode=false` comma-separated form —
            a single scalar `?operation=createBudget` or a comma-
            separated list `?operation=createBudget,updateBudget`.
            Servers MAY additionally accept the repeated form
            `?operation=createBudget&operation=updateBudget` as an
            implementation convenience; clients MUST NOT rely on it
            for portability. IN-list members are OR-composed; the
            predicate AND-composes with other filters. maxItems 25.
            Additive shape promotion — older clients sending a
            single scalar continue to work byte-identically on
            servers implementing this revision.
          schema:
            type: array
            items:
              type: string
            maxItems: 25
          explode: false
        - name: status
          in: query
          description: >-
            Filter by exact HTTP status. MUST NOT combine with
            status_min or status_max (server MUST reject the
            combination with HTTP 400 INVALID_REQUEST).
          schema:
            type: integer
        - name: resource_type
          in: query
          description: >-
            Filter by resource type (e.g., budget, tenant, api_key,
            policy, webhook, config). Exact-or-IN-list. Formal wire
            contract is the `explode=false` comma-separated form
            (single scalar or `?resource_type=budget,tenant`).
            Servers MAY additionally accept the repeated form as an
            implementation convenience; clients MUST NOT rely on it.
            maxItems 25. Additive shape promotion — older clients
            sending a single scalar continue to work byte-identically.
          schema:
            type: array
            items:
              type: string
            maxItems: 25
          explode: false
        - name: resource_id
          in: query
          description: Filter by resource ID (e.g., ledger ID, key ID, subscription ID)
          schema:
            type: string
        - name: error_code
          in: query
          description: >-
            Filter by audit entry error_code. Exact-or-IN-list.
            Formal wire contract is the `explode=false` comma-
            separated form. Servers MAY additionally accept the
            repeated form as an implementation convenience; clients
            MUST NOT rely on it. Case-sensitive. IN-list members are
            OR-composed; the predicate AND-composes with other
            filters. maxItems 25.

            NULL entry error_code (success entries) MUST NOT match —
            auditors asking "show me code X" never want success rows.

            Forward-compat: values are NOT validated against the
            ErrorCode enum. Unknown codes match nothing at the filter
            layer (a newer client sending a newly-added enum value
            MUST NOT cause a 400 against an older server).

            Additive parameter — servers that don't recognize it MUST
            ignore without error.
          schema:
            type: array
            items:
              type: string
            maxItems: 25
          explode: false
        - name: error_code_exclude
          in: query
          description: >-
            NOT-IN-list filter on audit entry error_code. Removes
            matching rows from the result set.

            NULL entry error_code MUST always pass — hiding noisy
            codes (e.g., INTERNAL_ERROR) MUST NOT silently hide
            successful (null-error_code) entries.

            MAY combine with `error_code` (AND-composed: "narrow to
            set A, minus subset B"). Case-sensitive. maxItems 25.

            Additive parameter — servers that don't recognize it MUST
            ignore without error.
          schema:
            type: array
            items:
              type: string
            maxItems: 25
          explode: false
        - name: status_min
          in: query
          description: >-
            Inclusive lower bound on audit entry status. MUST be in
            [100, 599]. MUST NOT combine with exact `status` (server
            MUST reject the combination with HTTP 400
            INVALID_REQUEST). When both status_min and status_max are
            present, server MUST reject status_min > status_max with
            HTTP 400.

            NULL entry status MUST NOT silently pass the range
            predicate; entries with absent status are treated as
            out-of-range for any numeric bound.

            Additive parameter — servers that don't recognize it MUST
            ignore without error.
          schema:
            type: integer
            minimum: 100
            maximum: 599
        - name: status_max
          in: query
          description: >-
            Inclusive upper bound on audit entry status. MUST be in
            [100, 599]. MUST NOT combine with exact `status`.
            NULL entry status does not satisfy the bound (see
            status_min for the identical NULL rule).

            Additive parameter — servers that don't recognize it MUST
            ignore without error.
          schema:
            type: integer
            minimum: 100
            maximum: 599
        - name: from
          in: query
          schema:
            type: string
            format: date-time
        - name: to
          in: query
          schema:
            type: string
            format: date-time
        - name: search
          in: query
          description: >-
            Free-text case-insensitive substring match. Matches across:
            resource_id, log_id, error_code, operation. Combined with
            other filter params using AND semantics. Additive
            parameter — servers that don't recognize it MUST ignore
            without error (additive-parameter guarantee).
            Empty string MUST be treated as absent. Max length 128
            characters; longer values MUST be rejected with HTTP 400.
          schema:
            type: string
            maxLength: 128
        - name: trace_id
          in: query
          description: >-
            Filter by exact trace_id. 32 lowercase hex characters (W3C Trace
            Context trace-id). Narrows the audit log to entries belonging to
            a single logical operation (may span multiple HTTP requests).
            When combined with other filters, AND-composed.
            Additive parameter — servers that don't recognize it MUST ignore
            without error (additive-parameter guarantee). See CORRELATION
            AND TRACING in cycles-protocol-v0.yaml.
          schema:
            type: string
            pattern: ^[0-9a-f]{32}$
        - name: request_id
          in: query
          description: >-
            Filter by exact request_id. Narrows the audit log to the entry
            produced by a single HTTP request. When combined with other
            filters, AND-composed. Typically yields 0 or 1 row (one audit
            entry per authenticated request).
            Additive parameter — servers that don't recognize it MUST ignore
            without error (additive-parameter guarantee).
          schema:
            type: string
        - name: sort_by
          in: query
          description: >-
            Sort key. When provided, results are returned in the requested
            order and the returned cursor encodes the sort key so "Load
            more" continues in sort order. When omitted, servers use
            their existing default ordering. Servers that don't
            recognize the parameter MUST ignore it without error
            (additive-parameter guarantee).
          schema:
            type: string
            enum: [timestamp, operation, resource_type, tenant_id, key_id, status]
            default: timestamp
        - name: sort_dir
          in: query
          description: Sort direction. Default descending.
          schema:
            $ref: '#/components/schemas/SortDirection'
        - name: cursor
          in: query
          schema:
            type: string
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
      responses:
        '400':
          description: >-
            Bad request. Returned (INVALID_REQUEST) when the server
            detects invalid parameter combinations or bounds — including
            (v0.1.25.24): any IN-list query param (`operation`,
            `resource_type`, `error_code`, `error_code_exclude`)
            exceeding maxItems 25; exact `status` combined with
            `status_min` or `status_max`; `status_min` or `status_max`
            outside [100, 599]; `status_min > status_max`; `search`
            exceeding 128 chars; plus the usual malformed-JSON /
            invalid-enum cases.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '200':
          description: Audit log entries
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuditLogListResponse'
        '401':
          description: Missing or invalid admin API key
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

