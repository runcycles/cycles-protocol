          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: >-
            Owning tenant is CLOSED (`TENANT_CLOSED`). Terminal-owner
            mutation guard per CASCADE SEMANTICS Rule 2 — test delivery
            dispatch on a subscription whose owning tenant is CLOSED is rejected.
          content:
            application/json:
