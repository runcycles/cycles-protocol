  /v1/admin/events:
    get:
      tags: [Events]
      operationId: listEvents
      x-conformance: normative
      summary: Query the event stream
      description: >-
        Returns paginated events with filtering by type, category, tenant, scope,
        and time range. This is the canonical event log — all events that triggered
        (or would have triggered) webhooks are queryable here.

        USE CASES:
        - Debug why a webhook fired (or didn't fire)
        - Reconstruct event history for a scope
        - Build custom integrations without webhooks (poll-based)
        - Audit trail supplement (events are more granular than audit logs)

        RETENTION:
        - Same as audit log retention (recommended: 90 days hot, 1 year cold).
      security:
        - AdminKeyAuth: []
      parameters:
        - name: tenant_id
          in: query
          schema:
            type: string
        - name: event_type
          in: query
          description: Filter by specific event type
          schema:
            $ref: '#/components/schemas/EventType'
        - name: category
          in: query
          description: Filter by event category
          schema:
            $ref: '#/components/schemas/EventCategory'
        - name: scope
          in: query
          description: Filter by scope path (prefix match)
          schema:
            type: string
        - name: correlation_id
          in: query
          description: Filter by correlation ID to find related events
          schema:
            type: string
        - name: trace_id
          in: query
          description: >-
            Filter by exact trace_id. 32 lowercase hex characters (W3C Trace
            Context trace-id). Narrows the event stream to events belonging
            to a single logical operation (may span multiple HTTP requests,
            so typically yields MORE rows than a request_id filter). When
            combined with other filters, AND-composed.
            Additive parameter — servers that don't recognize it MUST ignore
            without error (additive-parameter guarantee). See CORRELATION
            AND TRACING in cycles-protocol-v0.yaml.
          schema:
            type: string
            pattern: ^[0-9a-f]{32}$
        - name: request_id
          in: query
          description: >-
            Filter by exact request_id. Narrows the event stream to events
            emitted as side effects of a single HTTP request. When combined
            with other filters, AND-composed. Complements trace_id for
            debug scenarios like "show me all events emitted by this specific
            API call" (e.g., the fan-out from a bulk-action endpoint).
            Additive parameter — servers that don't recognize it MUST ignore
            without error (additive-parameter guarantee).
          schema:
            type: string
        - name: from
          in: query
          schema:
            type: string
            format: date-time
        - name: to
          in: query
          schema:
            type: string
            format: date-time
        - name: search
          in: query
          description: >-
            Free-text case-insensitive substring match. Matches across:
            correlation_id, scope. Combined with other filter params using
            AND semantics. Additive parameter — servers that don't
            recognize it MUST ignore without error (additive-parameter
            guarantee).
            Empty string MUST be treated as absent. Max length 128
            characters; longer values MUST be rejected with HTTP 400.
          schema:
            type: string
            maxLength: 128
        - name: sort_by
          in: query
          description: >-
            Sort key. When provided, results are returned in the requested
            order and the returned cursor encodes the sort key so "Load
            more" continues in sort order. When omitted, servers use
            their existing default ordering. Servers that don't
            recognize the parameter MUST ignore it without error
            (additive-parameter guarantee).
          schema:
            type: string
            enum: [event_type, category, scope, tenant_id, timestamp]
            default: timestamp
        - name: sort_dir
          in: query
          description: Sort direction. Default descending.
          schema:
            $ref: '#/components/schemas/SortDirection'
        - name: cursor
          in: query
          schema:
            type: string
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 50
      responses:
        '400':
          description: Bad request (malformed JSON, missing required fields, invalid enum, etc.)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '200':
